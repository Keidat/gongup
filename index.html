<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>공업 단원 시험 대비 퀴즈</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Black+Han+Sans&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --card: #1c2230;
    --border: #30363d;
    --accent: #58a6ff;
    --accent2: #f78166;
    --accent3: #56d364;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --correct: #1a4731;
    --correct-border: #56d364;
    --wrong: #4a1c1c;
    --wrong-border: #f85149;
    --yellow: #e3b341;
    --hard: #c678dd;
    --hard-bg: rgba(198,120,221,0.12);
    --hard-border: rgba(198,120,221,0.35);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
  }

  /* ── 시작 화면 ── */
  #start-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
    position: relative;
    overflow: hidden;
  }

  #start-screen::before {
    content: '';
    position: absolute;
    top: -200px; left: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(88,166,255,0.12) 0%, transparent 70%);
    pointer-events: none;
  }

  #start-screen::after {
    content: '';
    position: absolute;
    bottom: -150px; right: -100px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(247,129,102,0.10) 0%, transparent 70%);
    pointer-events: none;
  }

  .start-badge {
    background: rgba(88,166,255,0.15);
    border: 1px solid rgba(88,166,255,0.35);
    color: var(--accent);
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    padding: 0.35rem 1rem;
    border-radius: 100px;
    margin-bottom: 1.5rem;
    text-transform: uppercase;
  }

  .start-title {
    font-family: 'Black Han Sans', sans-serif;
    font-size: clamp(2.4rem, 6vw, 4rem);
    text-align: center;
    line-height: 1.15;
    margin-bottom: 0.8rem;
    background: linear-gradient(135deg, #e6edf3 0%, #58a6ff 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .start-sub {
    color: var(--text-muted);
    font-size: 1rem;
    text-align: center;
    margin-bottom: 2.5rem;
    line-height: 1.7;
  }

  .info-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1rem;
    margin-bottom: 2.5rem;
    width: 100%;
    max-width: 480px;
  }

  .info-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem;
    text-align: center;
  }

  .info-card .num {
    font-size: 1.8rem;
    font-weight: 900;
    color: var(--accent);
    display: block;
  }

  .info-card .lbl {
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-top: 0.2rem;
  }

  /* 난이도 선택 */
  .diff-select-label {
    font-size: 0.85rem;
    color: var(--text-muted);
    margin-bottom: 0.8rem;
    text-align: center;
  }

  .diff-buttons {
    display: flex;
    gap: 1rem;
    margin-bottom: 2rem;
    width: 100%;
    max-width: 480px;
  }

  .diff-btn {
    flex: 1;
    padding: 0.9rem 1rem;
    border-radius: 12px;
    border: 2px solid var(--border);
    background: var(--card);
    color: var(--text-muted);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.3rem;
  }

  .diff-btn .diff-icon { font-size: 1.5rem; }
  .diff-btn .diff-name { font-size: 1rem; }
  .diff-btn .diff-desc { font-size: 0.72rem; font-weight: 400; }

  .diff-btn.selected-normal {
    border-color: var(--accent);
    background: rgba(88,166,255,0.1);
    color: var(--accent);
  }

  .diff-btn.selected-hard {
    border-color: var(--hard);
    background: var(--hard-bg);
    color: var(--hard);
  }

  .btn-start {
    background: linear-gradient(135deg, #58a6ff, #388bfd);
    color: #fff;
    border: none;
    padding: 1rem 3rem;
    font-size: 1.1rem;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    border-radius: 12px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
    box-shadow: 0 4px 24px rgba(88,166,255,0.3);
  }

  .btn-start:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(88,166,255,0.45);
  }

  .btn-start.hard-mode {
    background: linear-gradient(135deg, #c678dd, #9b59b6);
    box-shadow: 0 4px 24px rgba(198,120,221,0.3);
  }

  .btn-start.hard-mode:hover {
    box-shadow: 0 8px 32px rgba(198,120,221,0.45);
  }

  /* ── 퀴즈 화면 (노말 스타일) ── */
  #quiz-screen {
    display: none;
    max-width: 720px;
    margin: 0 auto;
    padding: 2rem 1.5rem 5rem;
  }

  .quiz-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.5rem;
  }

  .quiz-counter {
    font-size: 0.85rem;
    color: var(--text-muted);
    font-weight: 700;
    letter-spacing: 0.05em;
  }

  .quiz-counter span { color: var(--accent); font-size: 1.1rem; }

  .score-badge {
    background: rgba(86,211,100,0.15);
    border: 1px solid rgba(86,211,100,0.3);
    color: var(--accent3);
    font-size: 0.8rem;
    font-weight: 700;
    padding: 0.3rem 0.8rem;
    border-radius: 100px;
  }

  .progress-bar-wrap {
    height: 4px;
    background: var(--border);
    border-radius: 99px;
    margin-bottom: 2rem;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #58a6ff, #56d364);
    border-radius: 99px;
    transition: width 0.4s ease;
  }

  .progress-bar-fill.hard-fill {
    background: linear-gradient(90deg, #c678dd, #f78166);
  }

  .question-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.8rem;
    margin-bottom: 1.4rem;
    position: relative;
    overflow: hidden;
  }

  .question-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, #58a6ff, #388bfd);
  }

  .question-card.hard-card::before {
    background: linear-gradient(90deg, #c678dd, #f78166);
  }

  .question-type {
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.8rem;
    display: flex;
    align-items: center;
    gap: 0.4rem;
    flex-wrap: wrap;
  }

  .question-type::before {
    content: '';
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
  }

  .question-card.hard-card .question-type { color: var(--hard); }
  .question-card.hard-card .question-type::before { background: var(--hard); }

  .hard-badge-inline {
    background: var(--hard-bg);
    border: 1px solid var(--hard-border);
    color: var(--hard);
    font-size: 0.68rem;
    padding: 0.1rem 0.5rem;
    border-radius: 100px;
    font-weight: 700;
  }

  .fmt-tag {
    background: rgba(88,166,255,0.12);
    border: 1px solid rgba(88,166,255,0.25);
    color: var(--accent);
    font-size: 0.68rem;
    padding: 0.1rem 0.5rem;
    border-radius: 100px;
    font-weight: 700;
  }

  .question-card.hard-card .fmt-tag {
    background: var(--hard-bg);
    border-color: var(--hard-border);
    color: var(--hard);
  }

  .question-text {
    font-size: 1.05rem;
    font-weight: 500;
    line-height: 1.7;
    color: var(--text);
    margin-top: 0.3rem;
  }

  /* 하드 문제 내부 박스 스타일 */
  .hq-box {
    background: rgba(255,255,255,0.03);
    border: 0.5px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    margin: 10px 0;
    font-size: 0.88rem;
    color: var(--text);
    line-height: 1.8;
  }

  .hq-box-title {
    font-size: 0.72rem;
    font-weight: 700;
    color: var(--text-muted);
    margin-bottom: 6px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .hq-underline {
    display: inline;
    border-bottom: 2px solid #f85149;
    color: var(--text);
    font-weight: 600;
  }

  .hq-arrow-flow {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 6px;
    margin: 10px 0;
    font-size: 0.85rem;
  }

  .hq-flow-box {
    background: rgba(255,255,255,0.05);
    border: 0.5px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px;
    color: var(--text);
    white-space: nowrap;
    font-size: 0.82rem;
    line-height: 1.4;
    text-align: center;
  }

  .hq-flow-blank {
    background: rgba(198,120,221,0.12);
    border: 0.5px solid rgba(198,120,221,0.4);
    border-radius: 8px;
    padding: 6px 14px;
    color: var(--hard);
    font-weight: 700;
    white-space: nowrap;
    font-size: 0.82rem;
  }

  .hq-flow-arrow { color: var(--text-muted); font-size: 1rem; }

  .hq-two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin: 10px 0;
  }

  .hq-col-card {
    background: rgba(255,255,255,0.03);
    border: 0.5px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 0.82rem;
    color: var(--text);
    line-height: 1.7;
  }

  .hq-col-label {
    font-size: 0.7rem;
    font-weight: 700;
    color: var(--text-muted);
    margin-bottom: 4px;
  }

  .hq-table-wrap { overflow-x: auto; margin: 10px 0; }
  .hq-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
  .hq-table th {
    background: rgba(255,255,255,0.04);
    color: var(--text-muted);
    font-weight: 600;
    padding: 7px 10px;
    text-align: left;
    border-bottom: 0.5px solid var(--border);
  }
  .hq-table td {
    padding: 7px 10px;
    border-bottom: 0.5px solid rgba(255,255,255,0.05);
    color: var(--text);
    vertical-align: top;
    line-height: 1.5;
  }

  /* 보기 공통 */
  .choices {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    margin-bottom: 1.4rem;
  }

  .choice-btn {
    background: var(--surface);
    border: 1.5px solid var(--border);
    color: var(--text);
    padding: 0.9rem 1.2rem;
    border-radius: 10px;
    text-align: left;
    font-size: 0.93rem;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: flex-start;
    gap: 0.8rem;
    line-height: 1.5;
  }

  .choice-btn:hover:not(:disabled) {
    border-color: var(--accent);
    background: rgba(88,166,255,0.08);
    transform: translateX(3px);
  }

  .hard-mode-active .choice-btn:hover:not(:disabled) {
    border-color: var(--hard);
    background: var(--hard-bg);
  }

  .choice-btn .choice-num {
    min-width: 24px;
    height: 24px;
    border-radius: 6px;
    background: var(--border);
    color: var(--text-muted);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.78rem;
    font-weight: 700;
    flex-shrink: 0;
    margin-top: 1px;
    transition: all 0.15s;
  }

  .choice-btn:hover:not(:disabled) .choice-num { background: var(--accent); color: #fff; }
  .hard-mode-active .choice-btn:hover:not(:disabled) .choice-num { background: var(--hard); color: #fff; }

  .choice-btn.correct { background: var(--correct); border-color: var(--correct-border); color: #fff; }
  .choice-btn.correct .choice-num { background: var(--correct-border); color: #fff; }
  .choice-btn.wrong { background: var(--wrong); border-color: var(--wrong-border); color: #fff; }
  .choice-btn.wrong .choice-num { background: var(--wrong-border); color: #fff; }
  .choice-btn:disabled { cursor: default; }

  .explanation {
    display: none;
    background: rgba(88,166,255,0.06);
    border: 1px solid rgba(88,166,255,0.2);
    border-radius: 10px;
    padding: 1rem 1.2rem;
    font-size: 0.88rem;
    color: #a8c9f7;
    line-height: 1.7;
    margin-bottom: 1.4rem;
  }

  .explanation .ex-label {
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 0.3rem;
    display: block;
    font-size: 0.78rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* 단답형 */
  .short-answer-wrap {
    display: flex;
    gap: 0.7rem;
    margin-bottom: 1.4rem;
    flex-direction: column;
  }

  .short-input-row { display: flex; gap: 0.7rem; }

  .short-input {
    flex: 1;
    background: var(--surface);
    border: 1.5px solid var(--border);
    color: var(--text);
    padding: 0.85rem 1rem;
    border-radius: 10px;
    font-size: 0.95rem;
    font-family: 'Noto Sans KR', sans-serif;
    outline: none;
    transition: border-color 0.15s;
  }

  .short-input:focus { border-color: var(--accent); }
  .short-input.correct { border-color: var(--correct-border); background: var(--correct); }
  .short-input.wrong { border-color: var(--wrong-border); background: var(--wrong); }

  .btn-submit {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 0.85rem 1.4rem;
    border-radius: 10px;
    font-size: 0.9rem;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: opacity 0.15s;
    white-space: nowrap;
  }

  .btn-submit:hover { opacity: 0.85; }
  .btn-submit:disabled { opacity: 0.4; cursor: default; }

  .sa-hint { font-size: 0.82rem; color: var(--text-muted); padding: 0 0.2rem; }
  .sa-hint.correct-hint { color: var(--accent3); font-weight: 700; }
  .sa-hint.wrong-hint { color: var(--accent2); }

  .btn-next {
    width: 100%;
    background: linear-gradient(135deg, #58a6ff, #388bfd);
    color: #fff;
    border: none;
    padding: 1rem;
    border-radius: 12px;
    font-size: 1rem;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: transform 0.15s, opacity 0.15s;
    display: none;
  }

  .btn-next.hard-next { background: linear-gradient(135deg, #c678dd, #9b59b6); }
  .btn-next:hover { opacity: 0.9; transform: translateY(-1px); }

  /* ── 결과 화면 ── */
  #result-screen {
    display: none;
    max-width: 600px;
    margin: 0 auto;
    padding: 3rem 1.5rem;
    text-align: center;
    min-height: 100vh;
    justify-content: center;
    flex-direction: column;
    align-items: center;
  }

  .result-emoji { font-size: 5rem; margin-bottom: 1rem; display: block; animation: bounce 0.5s ease; }

  @keyframes bounce {
    0% { transform: scale(0.5); opacity: 0; }
    70% { transform: scale(1.15); }
    100% { transform: scale(1); opacity: 1; }
  }

  .result-title { font-family: 'Black Han Sans', sans-serif; font-size: 2.2rem; margin-bottom: 0.5rem; }
  .result-score { font-size: 3.5rem; font-weight: 900; margin: 1rem 0; }
  .result-score .score-num { color: var(--accent); }
  .result-score .score-num.hard-score { color: var(--hard); }

  .result-diff-badge {
    display: inline-block;
    padding: 0.3rem 1rem;
    border-radius: 100px;
    font-size: 0.8rem;
    font-weight: 700;
    margin-bottom: 0.5rem;
  }

  .result-diff-badge.normal { background: rgba(88,166,255,0.15); border: 1px solid rgba(88,166,255,0.3); color: var(--accent); }
  .result-diff-badge.hard { background: var(--hard-bg); border: 1px solid var(--hard-border); color: var(--hard); }

  .result-detail { color: var(--text-muted); margin-bottom: 2rem; font-size: 0.95rem; line-height: 1.7; white-space: pre-line; }

  .result-bars { width: 100%; max-width: 400px; margin: 0 auto 2rem; display: flex; flex-direction: column; gap: 0.8rem; }
  .result-bar-row { display: flex; align-items: center; gap: 0.8rem; font-size: 0.85rem; }
  .result-bar-label { width: 50px; text-align: right; color: var(--text-muted); flex-shrink: 0; }
  .result-bar-track { flex: 1; height: 10px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .result-bar-fill-correct { height: 100%; background: var(--accent3); border-radius: 99px; transition: width 1s ease; }
  .result-bar-fill-wrong { height: 100%; background: var(--accent2); border-radius: 99px; transition: width 1s ease; }
  .result-bar-count { width: 30px; font-weight: 700; }

  .result-buttons { display: flex; gap: 0.8rem; width: 100%; max-width: 400px; flex-wrap: wrap; }

  .btn-retry {
    flex: 1;
    min-width: 120px;
    background: linear-gradient(135deg, #58a6ff, #388bfd);
    color: #fff;
    border: none;
    padding: 0.95rem;
    border-radius: 12px;
    font-size: 0.95rem;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .btn-retry:hover { opacity: 0.85; }

  .btn-retry-hard {
    flex: 1;
    min-width: 120px;
    background: linear-gradient(135deg, #c678dd, #9b59b6);
    color: #fff;
    border: none;
    padding: 0.95rem;
    border-radius: 12px;
    font-size: 0.95rem;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .btn-retry-hard:hover { opacity: 0.85; }

  .btn-review {
    flex: 1;
    min-width: 120px;
    background: var(--card);
    color: var(--text);
    border: 1.5px solid var(--border);
    padding: 0.95rem;
    border-radius: 12px;
    font-size: 0.95rem;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: border-color 0.15s;
  }

  .btn-review:hover { border-color: var(--accent); }

  @media (max-width: 600px) {
    .info-grid { grid-template-columns: repeat(3,1fr); gap: 0.6rem; }
    .question-text { font-size: 0.95rem; }
    .choice-btn { font-size: 0.85rem; padding: 0.75rem 0.9rem; }
    .hq-two-col { grid-template-columns: 1fr; }
    .diff-buttons { flex-direction: column; }
  }
</style>
</head>
<body>

<!-- 시작 화면 -->
<div id="start-screen">
  <div class="start-badge">📚 시험 대비 퀴즈</div>
  <h1 class="start-title">공업 단원<br>실력 점검</h1>
  <p class="start-sub">경공업 · 중화학공업 · 첨단공업<br>핵심 개념 총정리 퀴즈</p>
  <div class="info-grid">
    <div class="info-card">
      <span class="num">20</span>
      <div class="lbl">문제 수</div>
    </div>
    <div class="info-card">
      <span class="num" style="color:var(--yellow)">랜덤</span>
      <div class="lbl">출제 방식</div>
    </div>
    <div class="info-card">
      <span class="num" style="color:var(--accent3)">즉시</span>
      <div class="lbl">해설 제공</div>
    </div>
  </div>

  <p class="diff-select-label">난이도를 선택하세요</p>
  <div class="diff-buttons">
    <button class="diff-btn selected-normal" id="btn-diff-normal" onclick="selectDiff('normal')">
      <span class="diff-icon">📖</span>
      <span class="diff-name">노말</span>
      <span class="diff-desc">핵심 개념 객관식 + 단답형</span>
    </button>
    <button class="diff-btn" id="btn-diff-hard" onclick="selectDiff('hard')">
      <span class="diff-icon">🔥</span>
      <span class="diff-name">하드</span>
      <span class="diff-desc">신유형 고난도 추론 문제</span>
    </button>
  </div>

// ══════════════════════════════════════════
//  유틸 함수
// ══════════════════════════════════════════
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// 노말 MC: 정답1 + 오답5 중 3개 랜덤 = 4개
function pickNormalMC(choices, answerIdx) {
  const correctText = choices[answerIdx];
  const wrongChoices = choices.filter((_, i) => i !== answerIdx);
  const selectedWrong = shuffle(wrongChoices).slice(0, 3);
  const pool = shuffle([correctText, ...selectedWrong]);
  return { shuffledChoices: pool, newAnswerIdx: pool.indexOf(correctText) };
}

// 하드 MC: 보기 5개 중 정답1 + 오답4 → 정답1 + 랜덤 오답3 = 4개
function pickHardMC(choices, answerIdx) {
  const correctText = choices[answerIdx];
  const wrongChoices = choices.filter((_, i) => i !== answerIdx);
  const selectedWrong = shuffle(wrongChoices).slice(0, 3);
  const pool = shuffle([correctText, ...selectedWrong]);
  return { shuffledChoices: pool, newAnswerIdx: pool.indexOf(correctText) };
}

function checkSAAnswer(input, answers) {
  const normalize = s => s.replace(/\s/g, '').toLowerCase();
  const normInput = normalize(input);
  return answers.some(a => normalize(a) === normInput);
}

// ══════════════════════════════════════════
//  상태 변수
// ══════════════════════════════════════════
let selectedQuestions = [];
let currentIdx = 0;
let score = 0;
let answered = false;
let currentMode = 'normal'; // 'normal' | 'hard'

// ══════════════════════════════════════════
//  시작 화면 난이도 선택
// ══════════════════════════════════════════
function selectDiff(mode) {
  currentMode = mode;
  const btnNormal = document.getElementById('btn-diff-normal');
  const btnHard = document.getElementById('btn-diff-hard');
  const btnStart = document.getElementById('btn-start-main');

  if (mode === 'normal') {
    btnNormal.className = 'diff-btn selected-normal';
    btnHard.className = 'diff-btn';
    btnStart.className = 'btn-start';
    btnStart.textContent = '노말 시작하기 →';
  } else {
    btnNormal.className = 'diff-btn';
    btnHard.className = 'diff-btn selected-hard';
    btnStart.className = 'btn-start hard-mode';
    btnStart.textContent = '하드 시작하기 🔥';
  }
}

// ══════════════════════════════════════════
//  퀴즈 시작
// ══════════════════════════════════════════
function startQuiz(forcedMode) {
  if (forcedMode) currentMode = forcedMode;

  const pool = currentMode === 'hard' ? HARD_QUESTIONS : NORMAL_QUESTIONS;
  selectedQuestions = shuffle(pool).slice(0, Math.min(20, pool.length));
  currentIdx = 0;
  score = 0;

  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  document.getElementById('live-score').textContent = 0;

  // 하드 모드 진행바 색상
  const fill = document.getElementById('progress-fill');
  if (currentMode === 'hard') {
    fill.classList.add('hard-fill');
  } else {
    fill.classList.remove('hard-fill');
  }

  // quiz-screen hard 클래스
  const qs = document.getElementById('quiz-screen');
  if (currentMode === 'hard') qs.classList.add('hard-mode-active');
  else qs.classList.remove('hard-mode-active');

  renderQuestion();
}

function startHardRetry() {
  currentMode = 'hard';
  startQuiz('hard');
}

// ══════════════════════════════════════════
//  문제 렌더링
// ══════════════════════════════════════════
function renderQuestion() {
  answered = false;
  const q = selectedQuestions[currentIdx];
  const total = selectedQuestions.length;

  document.getElementById('cur-q').textContent = currentIdx + 1;
  document.getElementById('progress-fill').style.width = ((currentIdx + 1) / total * 100) + '%';
  document.getElementById('explanation').style.display = 'none';
  document.getElementById('btn-next').style.display = 'none';

  const qCard = document.getElementById('q-card');
  const qType = document.getElementById('q-type');
  const qText = document.getElementById('q-text');
  const qHtmlContent = document.getElementById('q-html-content');
  const btnNext = document.getElementById('btn-next');

  // 카드 스타일
  if (currentMode === 'hard') {
    qCard.classList.add('hard-card');
    btnNext.classList.add('hard-next');
  } else {
    qCard.classList.remove('hard-card');
    btnNext.classList.remove('hard-next');
  }

  // 문제 타입 표시
  if (q.type === 'mc') {
    qType.innerHTML = '✏️ 객관식';
  } else if (q.type === 'sa') {
    qType.innerHTML = '📝 단답형';
  } else if (q.type === 'mc_hard') {
    qType.innerHTML = `🔥 <span class="hard-badge-inline">HARD</span> &nbsp;<span class="fmt-tag">${q.fmt}</span>`;
  }

  qText.textContent = q.q;

  // 하드 HTML 콘텐츠
  if (q.htmlContent) {
    qHtmlContent.innerHTML = q.htmlContent;
  } else {
    qHtmlContent.innerHTML = '';
  }

  const area = document.getElementById('choices-area');
  area.innerHTML = '';

  if (q.type === 'mc') {
    const { shuffledChoices, newAnswerIdx } = pickNormalMC(q.choices, q.answer);
    renderMCChoices(area, shuffledChoices, newAnswerIdx, q);

  } else if (q.type === 'mc_hard') {
    const { shuffledChoices, newAnswerIdx } = pickHardMC(q.choices, q.answer);
    renderMCChoices(area, shuffledChoices, newAnswerIdx, q);

  } else {
    // 단답형
    renderSAInput(area, q);
  }
}

function renderMCChoices(area, choices, correctIdx, q) {
  const div = document.createElement('div');
  div.className = 'choices';
  const labels = ['①', '②', '③', '④'];
  choices.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = `<span class="choice-num">${labels[i]}</span><span>${c}</span>`;
    btn.onclick = () => handleMC(i, btn, div, correctIdx, q);
    div.appendChild(btn);
  });
  area.appendChild(div);
}

function renderSAInput(area, q) {
  const wrap = document.createElement('div');
  wrap.className = 'short-answer-wrap';
  const row = document.createElement('div');
  row.className = 'short-input-row';
  const inp = document.createElement('input');
  inp.className = 'short-input';
  inp.type = 'text';
  inp.placeholder = '정답을 입력하세요';
  const submitBtn = document.createElement('button');
  submitBtn.className = 'btn-submit';
  submitBtn.textContent = '제출';
  const hint = document.createElement('div');
  hint.className = 'sa-hint';
  const doSubmit = () => submitSA(inp, submitBtn, hint, q);
  inp.onkeydown = e => { if (e.key === 'Enter') doSubmit(); };
  submitBtn.onclick = doSubmit;
  row.appendChild(inp);
  row.appendChild(submitBtn);
  wrap.appendChild(row);
  wrap.appendChild(hint);
  area.appendChild(wrap);
  setTimeout(() => inp.focus(), 100);
}

// ══════════════════════════════════════════
//  정답 처리
// ══════════════════════════════════════════
function handleMC(idx, btn, div, correctIdx, q) {
  if (answered) return;
  answered = true;
  const btns = div.querySelectorAll('.choice-btn');
  btns.forEach(b => b.disabled = true);
  const isCorrect = idx === correctIdx;
  btns[correctIdx].classList.add('correct');
  if (!isCorrect) btn.classList.add('wrong');
  if (isCorrect) score++;
  document.getElementById('live-score').textContent = score;
  showExp(q.exp);
}

function submitSA(inp, submitBtn, hint, q) {
  if (answered) return;
  const val = inp.value.trim();
  if (!val) return;
  answered = true;
  inp.disabled = true;
  submitBtn.disabled = true;
  const isCorrect = checkSAAnswer(val, q.answers);
  if (isCorrect) {
    inp.classList.add('correct');
    hint.className = 'sa-hint correct-hint';
    hint.textContent = '✅ 정답입니다!';
    score++;
  } else {
    inp.classList.add('wrong');
    hint.className = 'sa-hint wrong-hint';
    hint.textContent = `❌ 오답 — 정답: ${q.answers[0]}`;
  }
  document.getElementById('live-score').textContent = score;
  showExp(q.exp);
}

function showExp(text) {
  const el = document.getElementById('explanation');
  document.getElementById('exp-text').textContent = text;
  el.style.display = 'block';
  const nextBtn = document.getElementById('btn-next');
  nextBtn.style.display = 'block';
  nextBtn.textContent = currentIdx < selectedQuestions.length - 1 ? '다음 문제 →' : '결과 보기 🏁';
  nextBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// ══════════════════════════════════════════
//  다음 문제 / 결과
// ══════════════════════════════════════════
function nextQuestion() {
  currentIdx++;
  if (currentIdx >= selectedQuestions.length) {
    showResult();
  } else {
    renderQuestion();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function showResult() {
  document.getElementById('quiz-screen').style.display = 'none';
  const rs = document.getElementById('result-screen');
  rs.style.display = 'flex';

  const total = selectedQuestions.length;
  const pct = Math.round(score / total * 100);

  document.getElementById('result-score-num').textContent = score;
  const scoreNum = document.getElementById('result-score-num');
  if (currentMode === 'hard') scoreNum.classList.add('hard-score');
  else scoreNum.classList.remove('hard-score');

  document.getElementById('cnt-correct').textContent = score;
  document.getElementById('cnt-wrong').textContent = total - score;

  const diffBadge = document.getElementById('result-diff-badge');
  if (currentMode === 'hard') {
    diffBadge.className = 'result-diff-badge hard';
    diffBadge.textContent = '🔥 하드 모드';
  } else {
    diffBadge.className = 'result-diff-badge normal';
    diffBadge.textContent = '📖 노말 모드';
  }

  setTimeout(() => {
    document.getElementById('bar-correct').style.width = (score / total * 100) + '%';
    document.getElementById('bar-wrong').style.width = ((total - score) / total * 100) + '%';
  }, 200);

  let emoji, title, detail;
  if (pct >= 90) {
    emoji = '🏆'; title = '완벽해요!';
    detail = `${total}문제 중 ${score}문제 정답 (${pct}%)\n공업 단원 완전 정복!`;
  } else if (pct >= 70) {
    emoji = '😊'; title = '잘했어요!';
    detail = `${total}문제 중 ${score}문제 정답 (${pct}%)\n조금만 더 보강하면 만점!`;
  } else if (pct >= 50) {
    emoji = '📖'; title = '더 공부해요!';
    detail = `${total}문제 중 ${score}문제 정답 (${pct}%)\n오답 노트를 꼭 만들어보세요.`;
  } else {
    emoji = '💪'; title = '다시 도전!';
    detail = `${total}문제 중 ${score}문제 정답 (${pct}%)\n핵심 개념을 다시 복습해요.`;
  }

  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('result-title').textContent = title;
  document.getElementById('result-detail').textContent = detail;
}

function goHome() {
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('start-screen').style.display = 'flex';
}

// 초기 버튼 텍스트 설정
document.getElementById('btn-start-main').textContent = '노말 시작하기 →';
</script>
