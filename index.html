<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>공업 단원 시험 대비 퀴즈</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Black+Han+Sans&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --card: #1c2230; --border: #30363d;
    --accent: #58a6ff; --accent2: #f78166; --accent3: #56d364; --text: #e6edf3;
    --text-muted: #8b949e; --correct: #1a4731; --correct-border: #56d364;
    --wrong: #4a1c1c; --wrong-border: #f85149; --yellow: #e3b341;
    --hard: #c678dd; --hard-bg: rgba(198,120,221,0.12); --hard-border: rgba(198,120,221,0.35);
    --expert: #f0b429; --expert-bg: rgba(240,180,41,0.12); --expert-border: rgba(240,180,41,0.4);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; min-height: 100vh; }
  #start-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; position: relative; overflow: hidden; }
  #start-screen::before { content: ''; position: absolute; top: -200px; left: -200px; width: 600px; height: 600px; background: radial-gradient(circle, rgba(88,166,255,0.12) 0%, transparent 70%); pointer-events: none; }
  #start-screen::after { content: ''; position: absolute; bottom: -150px; right: -100px; width: 500px; height: 500px; background: radial-gradient(circle, rgba(247,129,102,0.10) 0%, transparent 70%); pointer-events: none; }
  .start-badge { background: rgba(88,166,255,0.15); border: 1px solid rgba(88,166,255,0.35); color: var(--accent); font-size: 0.78rem; font-weight: 700; letter-spacing: 0.12em; padding: 0.35rem 1rem; border-radius: 100px; margin-bottom: 1.5rem; text-transform: uppercase; }
  .start-title { font-family: 'Black Han Sans', sans-serif; font-size: clamp(2.4rem, 6vw, 4rem); text-align: center; line-height: 1.15; margin-bottom: 0.8rem; background: linear-gradient(135deg, #e6edf3 0%, #58a6ff 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .start-sub { color: var(--text-muted); font-size: 1rem; text-align: center; margin-bottom: 2.5rem; line-height: 1.7; }
  .info-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 2rem; width: 100%; max-width: 480px; }
  .info-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1rem; text-align: center; }
  .info-card .num { font-size: 1.8rem; font-weight: 900; color: var(--accent); display: block; }
  .info-card .lbl { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.2rem; }
  .diff-select-label { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.8rem; text-align: center; }
  .diff-buttons { display: flex; gap: 0.8rem; margin-bottom: 2rem; width: 100%; max-width: 540px; flex-wrap: wrap; justify-content: center; }
  .diff-btn { flex: 1; min-width: 140px; padding: 0.85rem 0.8rem; border-radius: 12px; border: 2px solid var(--border); background: var(--card); color: var(--text-muted); font-family: 'Noto Sans KR', sans-serif; font-size: 0.92rem; font-weight: 700; cursor: pointer; transition: all 0.2s; display: flex; flex-direction: column; align-items: center; gap: 0.25rem; }
  .diff-btn .diff-icon { font-size: 1.4rem; } .diff-btn .diff-name { font-size: 0.95rem; } .diff-btn .diff-desc { font-size: 0.68rem; font-weight: 400; opacity: 0.7; }
  .diff-btn.selected-normal { border-color: var(--accent); background: rgba(88,166,255,0.1); color: var(--accent); }
  .diff-btn.selected-hard { border-color: var(--hard); background: var(--hard-bg); color: var(--hard); }
  .diff-btn.selected-expert { border-color: var(--expert); background: var(--expert-bg); color: var(--expert); }
  .btn-start { background: linear-gradient(135deg, #58a6ff, #388bfd); color: #fff; border: none; padding: 1rem 3rem; font-size: 1.1rem; font-weight: 700; font-family: 'Noto Sans KR', sans-serif; border-radius: 12px; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; box-shadow: 0 4px 24px rgba(88,166,255,0.3); }
  .btn-start:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(88,166,255,0.45); }
  .btn-start.hard-mode { background: linear-gradient(135deg, #c678dd, #9b59b6); box-shadow: 0 4px 24px rgba(198,120,221,0.3); }
  .btn-start.hard-mode:hover { box-shadow: 0 8px 32px rgba(198,120,221,0.45); }
  .btn-start.expert-mode { background: linear-gradient(135deg, #f0b429, #d97706); box-shadow: 0 4px 24px rgba(240,180,41,0.3); }
  .btn-start.expert-mode:hover { box-shadow: 0 8px 32px rgba(240,180,41,0.45); }
  #quiz-screen { display: none; max-width: 720px; margin: 0 auto; padding: 2rem 1.5rem 5rem; }
  .quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
  .quiz-counter { font-size: 0.85rem; color: var(--text-muted); font-weight: 700; letter-spacing: 0.05em; }
  .quiz-counter span { color: var(--accent); font-size: 1.1rem; }
  .score-badge { background: rgba(86,211,100,0.15); border: 1px solid rgba(86,211,100,0.3); color: var(--accent3); font-size: 0.8rem; font-weight: 700; padding: 0.3rem 0.8rem; border-radius: 100px; }
  .progress-bar-wrap { height: 4px; background: var(--border); border-radius: 99px; margin-bottom: 2rem; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: linear-gradient(90deg, #58a6ff, #56d364); border-radius: 99px; transition: width 0.4s ease; }
  .progress-bar-fill.hard-fill { background: linear-gradient(90deg, #c678dd, #f78166); }
  .progress-bar-fill.expert-fill { background: linear-gradient(90deg, #f0b429, #f85149); }
  .question-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 1.8rem; margin-bottom: 1.4rem; position: relative; overflow: hidden; }
  .question-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, #58a6ff, #388bfd); }
  .question-card.hard-card::before { background: linear-gradient(90deg, #c678dd, #f78166); }
  .question-card.expert-card::before { background: linear-gradient(90deg, #f0b429, #f85149); }
  .question-type { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.8rem; display: flex; align-items: center; gap: 0.4rem; flex-wrap: wrap; }
  .question-type::before { content: ''; display: inline-block; width: 6px; height: 6px; background: var(--accent); border-radius: 50%; }
  .question-card.hard-card .question-type { color: var(--hard); }
  .question-card.hard-card .question-type::before { background: var(--hard); }
  .question-card.expert-card .question-type { color: var(--expert); }
  .question-card.expert-card .question-type::before { background: var(--expert); }
  .hard-badge-inline { background: var(--hard-bg); border: 1px solid var(--hard-border); color: var(--hard); font-size: 0.68rem; padding: 0.1rem 0.5rem; border-radius: 100px; font-weight: 700; }
  .expert-badge-inline { background: var(--expert-bg); border: 1px solid var(--expert-border); color: var(--expert); font-size: 0.68rem; padding: 0.1rem 0.5rem; border-radius: 100px; font-weight: 700; }
  .fmt-tag { background: rgba(88,166,255,0.12); border: 1px solid rgba(88,166,255,0.25); color: var(--accent); font-size: 0.68rem; padding: 0.1rem 0.5rem; border-radius: 100px; font-weight: 700; }
  .question-card.hard-card .fmt-tag { background: var(--hard-bg); border-color: var(--hard-border); color: var(--hard); }
  .question-card.expert-card .fmt-tag { background: var(--expert-bg); border-color: var(--expert-border); color: var(--expert); }
  .question-text { font-size: 1.05rem; font-weight: 500; line-height: 1.7; color: var(--text); margin-top: 0.3rem; }
  .hq-box { background: rgba(255,255,255,0.03); border: 0.5px solid var(--border); border-radius: 10px; padding: 12px 14px; margin: 10px 0; font-size: 0.88rem; color: var(--text); line-height: 1.8; }
  .hq-box-title { font-size: 0.72rem; font-weight: 700; color: var(--text-muted); margin-bottom: 6px; letter-spacing: 0.05em; text-transform: uppercase; }
  .hq-underline { display: inline; border-bottom: 2px solid #f85149; color: var(--text); font-weight: 600; }
  .hq-arrow-flow { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; margin: 10px 0; font-size: 0.85rem; }
  .hq-flow-box { background: rgba(255,255,255,0.05); border: 0.5px solid var(--border); border-radius: 8px; padding: 6px 12px; color: var(--text); white-space: nowrap; font-size: 0.82rem; line-height: 1.4; text-align: center; }
  .hq-flow-blank { background: rgba(198,120,221,0.12); border: 0.5px solid rgba(198,120,221,0.4); border-radius: 8px; padding: 6px 14px; color: var(--hard); font-weight: 700; white-space: nowrap; font-size: 0.82rem; }
  .hq-flow-blank-expert { background: var(--expert-bg); border: 0.5px solid var(--expert-border); border-radius: 8px; padding: 6px 14px; color: var(--expert); font-weight: 700; white-space: nowrap; font-size: 0.82rem; }
  .hq-flow-arrow { color: var(--text-muted); font-size: 1rem; }
  .hq-two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 10px 0; }
  .hq-col-card { background: rgba(255,255,255,0.03); border: 0.5px solid var(--border); border-radius: 8px; padding: 10px 12px; font-size: 0.82rem; color: var(--text); line-height: 1.7; }
  .hq-col-label { font-size: 0.7rem; font-weight: 700; color: var(--text-muted); margin-bottom: 4px; }
  .hq-table-wrap { overflow-x: auto; margin: 10px 0; }
  .hq-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
  .hq-table th { background: rgba(255,255,255,0.04); color: var(--text-muted); font-weight: 600; padding: 7px 10px; text-align: left; border-bottom: 0.5px solid var(--border); }
  .hq-table td { padding: 7px 10px; border-bottom: 0.5px solid rgba(255,255,255,0.05); color: var(--text); vertical-align: top; line-height: 1.5; }
  .choices { display: flex; flex-direction: column; gap: 0.75rem; margin-bottom: 1.4rem; }
  .choice-btn { background: var(--surface); border: 1.5px solid var(--border); color: var(--text); padding: 0.9rem 1.2rem; border-radius: 10px; text-align: left; font-size: 0.93rem; font-family: 'Noto Sans KR', sans-serif; cursor: pointer; transition: all 0.15s; display: flex; align-items: flex-start; gap: 0.8rem; line-height: 1.5; }
  .choice-btn:hover:not(:disabled) { border-color: var(--accent); background: rgba(88,166,255,0.08); transform: translateX(3px); }
  .hard-mode-active .choice-btn:hover:not(:disabled) { border-color: var(--hard); background: var(--hard-bg); }
  .expert-mode-active .choice-btn:hover:not(:disabled) { border-color: var(--expert); background: var(--expert-bg); }
  .choice-btn .choice-num { min-width: 24px; height: 24px; border-radius: 6px; background: var(--border); color: var(--text-muted); display: flex; align-items: center; justify-content: center; font-size: 0.78rem; font-weight: 700; flex-shrink: 0; margin-top: 1px; transition: all 0.15s; }
  .choice-btn:hover:not(:disabled) .choice-num { background: var(--accent); color: #fff; }
  .hard-mode-active .choice-btn:hover:not(:disabled) .choice-num { background: var(--hard); color: #fff; }
  .expert-mode-active .choice-btn:hover:not(:disabled) .choice-num { background: var(--expert); color: #000; }
  .choice-btn.correct { background: var(--correct); border-color: var(--correct-border); color: #fff; }
  .choice-btn.correct .choice-num { background: var(--correct-border); color: #fff; }
  .choice-btn.wrong { background: var(--wrong); border-color: var(--wrong-border); color: #fff; }
  .choice-btn.wrong .choice-num { background: var(--wrong-border); color: #fff; }
  .choice-btn:disabled { cursor: default; }
  .explanation { display: none; background: rgba(88,166,255,0.06); border: 1px solid rgba(88,166,255,0.2); border-radius: 10px; padding: 1rem 1.2rem; font-size: 0.88rem; color: #a8c9f7; line-height: 1.7; margin-bottom: 1.4rem; }
  .explanation .ex-label { font-weight: 700; color: var(--accent); margin-bottom: 0.3rem; display: block; font-size: 0.78rem; letter-spacing: 0.08em; text-transform: uppercase; }
  .short-answer-wrap { display: flex; gap: 0.7rem; margin-bottom: 1.4rem; flex-direction: column; }
  .short-input-row { display: flex; gap: 0.7rem; }
  .short-input { flex: 1; background: var(--surface); border: 1.5px solid var(--border); color: var(--text); padding: 0.85rem 1rem; border-radius: 10px; font-size: 0.95rem; font-family: 'Noto Sans KR', sans-serif; outline: none; transition: border-color 0.15s; }
  .short-input:focus { border-color: var(--accent); }
  .short-input.correct { border-color: var(--correct-border); background: var(--correct); }
  .short-input.wrong { border-color: var(--wrong-border); background: var(--wrong); }
  .btn-submit { background: var(--accent); color: #fff; border: none; padding: 0.85rem 1.4rem; border-radius: 10px; font-size: 0.9rem; font-weight: 700; font-family: 'Noto Sans KR', sans-serif; cursor: pointer; transition: opacity 0.15s; white-space: nowrap; }
  .btn-submit:hover { opacity: 0.85; } .btn-submit:disabled { opacity: 0.4; cursor: default; }
  .sa-hint { font-size: 0.82rem; color: var(--text-muted); padding: 0 0.2rem; }
  .sa-hint.correct-hint { color: var(--accent3); font-weight: 700; }
  .sa-hint.wrong-hint { color: var(--accent2); }
  .btn-next { width: 100%; background: linear-gradient(135deg, #58a6ff, #388bfd); color: #fff; border: none; padding: 1rem; border-radius: 12px; font-size: 1rem; font-weight: 700; font-family: 'Noto Sans KR', sans-serif; cursor: pointer; transition: transform 0.15s, opacity 0.15s; display: none; }
  .btn-next.hard-next { background: linear-gradient(135deg, #c678dd, #9b59b6); }
  .btn-next.expert-next { background: linear-gradient(135deg, #f0b429, #d97706); color: #000; }
  .btn-next:hover { opacity: 0.9; transform: translateY(-1px); }
  #result-screen { display: none; max-width: 600px; margin: 0 auto; padding: 3rem 1.5rem; text-align: center; min-height: 100vh; justify-content: center; flex-direction: column; align-items: center; }
  .result-emoji { font-size: 5rem; margin-bottom: 1rem; display: block; animation: bounce 0.5s ease; }
  @keyframes bounce { 0%{transform:scale(0.5);opacity:0} 70%{transform:scale(1.15)} 100%{transform:scale(1);opacity:1} }
  .result-title { font-family: 'Black Han Sans', sans-serif; font-size: 2.2rem; margin-bottom: 0.5rem; }
  .result-score { font-size: 3.5rem; font-weight: 900; margin: 1rem 0; }
  .result-score .score-num { color: var(--accent); }
  .result-score .score-num.hard-score { color: var(--hard); }
  .result-score .score-num.expert-score { color: var(--expert); }
  .result-diff-badge { display: inline-block; padding: 0.3rem 1rem; border-radius: 100px; font-size: 0.8rem; font-weight: 700; margin-bottom: 0.5rem; }
  .result-diff-badge.normal { background: rgba(88,166,255,0.15); border: 1px solid rgba(88,166,255,0.3); color: var(--accent); }
  .result-diff-badge.hard { background: var(--hard-bg); border: 1px solid var(--hard-border); color: var(--hard); }
  .result-diff-badge.expert { background: var(--expert-bg); border: 1px solid var(--expert-border); color: var(--expert); }
  .result-detail { color: var(--text-muted); margin-bottom: 2rem; font-size: 0.95rem; line-height: 1.7; white-space: pre-line; }
  .result-bars { width: 100%; max-width: 400px; margin: 0 auto 2rem; display: flex; flex-direction: column; gap: 0.8rem; }
  .result-bar-row { display: flex; align-items: center; gap: 0.8rem; font-size: 0.85rem; }
  .result-bar-label { width: 50px; text-align: right; color: var(--text-muted); flex-shrink: 0; }
  .result-bar-track { flex: 1; height: 10px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .result-bar-fill-correct { height: 100%; background: var(--accent3); border-radius: 99px; transition: width 1s ease; }
  .result-bar-fill-wrong { height: 100%; background: var(--accent2); border-radius: 99px; transition: width 1s ease; }
  .result-bar-count { width: 30px; font-weight: 700; }
  .result-buttons { display: flex; gap: 0.7rem; width: 100%; max-width: 480px; flex-wrap: wrap; }
  .btn-r { flex: 1; min-width: 100px; border: none; padding: 0.85rem 0.5rem; border-radius: 12px; font-size: 0.88rem; font-weight: 700; font-family: 'Noto Sans KR', sans-serif; cursor: pointer; transition: opacity 0.15s; }
  .btn-r:hover { opacity: 0.85; }
  .btn-r.normal { background: linear-gradient(135deg, #58a6ff, #388bfd); color: #fff; }
  .btn-r.hard-btn { background: linear-gradient(135deg, #c678dd, #9b59b6); color: #fff; }
  .btn-r.expert-btn { background: linear-gradient(135deg, #f0b429, #d97706); color: #000; }
  .btn-r.home { background: var(--card); color: var(--text); border: 1.5px solid var(--border); }
  .btn-r.home:hover { border-color: var(--accent); }
  @media(max-width:600px){ .info-grid{grid-template-columns:repeat(3,1fr);gap:0.6rem} .question-text{font-size:0.95rem} .choice-btn{font-size:0.85rem;padding:0.75rem 0.9rem} .hq-two-col{grid-template-columns:1fr} .diff-buttons{flex-direction:column} }
</style>
</head>
<body>

<div id="start-screen">
  <div class="start-badge">📚 시험 대비 퀴즈</div>
  <h1 class="start-title">공업 단원<br>실력 점검</h1>
  <p class="start-sub">경공업 · 중화학공업 · 첨단공업<br>핵심 개념 총정리 퀴즈</p>
  <div class="info-grid">
    <div class="info-card"><span class="num">20</span><div class="lbl">문제 수</div></div>
    <div class="info-card"><span class="num" style="color:var(--yellow)">랜덤</span><div class="lbl">출제 방식</div></div>
    <div class="info-card"><span class="num" style="color:var(--accent3)">즉시</span><div class="lbl">해설 제공</div></div>
  </div>
  <p class="diff-select-label">난이도를 선택하세요</p>
  <div class="diff-buttons">
    <button class="diff-btn selected-normal" id="btn-diff-normal" onclick="selectDiff('normal')">
      <span class="diff-icon">📖</span><span class="diff-name">노말</span><span class="diff-desc">핵심 개념 (50문항 풀)</span>
    </button>
    <button class="diff-btn" id="btn-diff-hard" onclick="selectDiff('hard')">
      <span class="diff-icon">🔥</span><span class="diff-name">하드</span><span class="diff-desc">신유형 고난도 (50문항 풀)</span>
    </button>
    <button class="diff-btn" id="btn-diff-expert" onclick="selectDiff('expert')">
      <span class="diff-icon">⚡</span><span class="diff-name">익스퍼트</span><span class="diff-desc">수능형 최고난도 (20문항)</span>
    </button>
  </div>
  <button class="btn-start" id="btn-start-main" onclick="startQuiz()">노말 시작하기 →</button>
</div>

<div id="quiz-screen">
  <div class="quiz-header">
    <div class="quiz-counter">문제 <span id="cur-q">1</span> / 20</div>
    <div class="score-badge">점수: <span id="live-score">0</span>점</div>
  </div>
  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-fill" style="width:5%"></div></div>
  <div class="question-card" id="q-card">
    <div class="question-type" id="q-type">객관식</div>
    <div class="question-text" id="q-text"></div>
    <div id="q-html-content"></div>
  </div>
  <div id="choices-area"></div>
  <div class="explanation" id="explanation"><span class="ex-label">💡 해설</span><span id="exp-text"></span></div>
  <button class="btn-next" id="btn-next" onclick="nextQuestion()">다음 문제 →</button>
</div>

<div id="result-screen">
  <span class="result-emoji" id="result-emoji">🎉</span>
  <div class="result-diff-badge normal" id="result-diff-badge">노말 모드</div>
  <h2 class="result-title" id="result-title">수고했어요!</h2>
  <div class="result-score"><span class="score-num" id="result-score-num">0</span> <span style="font-size:1.5rem;color:var(--text-muted)">/ 20</span></div>
  <p class="result-detail" id="result-detail"></p>
  <div class="result-bars">
    <div class="result-bar-row">
      <span class="result-bar-label" style="color:var(--accent3)">정답</span>
      <div class="result-bar-track"><div class="result-bar-fill-correct" id="bar-correct" style="width:0%"></div></div>
      <span class="result-bar-count" style="color:var(--accent3)" id="cnt-correct">0</span>
    </div>
    <div class="result-bar-row">
      <span class="result-bar-label" style="color:var(--accent2)">오답</span>
      <div class="result-bar-track"><div class="result-bar-fill-wrong" id="bar-wrong" style="width:0%"></div></div>
      <span class="result-bar-count" style="color:var(--accent2)" id="cnt-wrong">0</span>
    </div>
  </div>
  <div class="result-buttons">
    <button class="btn-r normal" onclick="startQuiz('normal')">📖 노말</button>
    <button class="btn-r hard-btn" onclick="startQuiz('hard')">🔥 하드</button>
    <button class="btn-r expert-btn" onclick="startQuiz('expert')">⚡ 익스퍼트</button>
    <button class="btn-r home" onclick="goHome()">🏠 처음</button>
  </div>
</div>

// 유틸
// ════════════════════════════════════════════════
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a;}
function pickMC(choices,answerIdx){
  const correct=choices[answerIdx];
  const wrong=shuffle(choices.filter((_,i)=>i!==answerIdx)).slice(0,3);
  const pool=shuffle([correct,...wrong]);
  return{shuffledChoices:pool,newAnswerIdx:pool.indexOf(correct)};
}
function checkSA(input,answers){
  const norm=s=>s.replace(/\s/g,'').toLowerCase();
  return answers.some(a=>norm(a)===norm(input));
}

  {type:'mc_hard',fmt:'공통 개념 찾기',q:'다음 (가)~(다)의 공통점을 가장 잘 설명한 것은?',htmlContent:`<div class="hq-two-col"><div class="hq-col-card"><div class="hq-col-label">(가)</div>석유 화학 공업<br>제철 공업</div><div class="hq-col-card"><div class="hq-col-label">(나)</div>거대한 설비 필수<br>고도의 자동화 시스템</div></div><div class="hq-box"><div class="hq-box-title">(다)</div>대규모 자본 투자 요구, 자본 집약적 성격 강함</div>`,choices:['(가)~(다)는 모두 경공업의 특징을 설명한다','(가)~(다)는 모두 장치 공업의 특징에 해당한다','(가)~(다)는 모두 노동 집약적 산업의 특징이다','(가)는 기초 공업, (나)(다)는 공영 공업을 설명한다','(가)~(다)는 모두 시장 지향형 공업의 사례이다'],answer:1,exp:'석유 화학·제철 공업은 장치 공업의 대표 사례이며, 거대 설비·고도 자동화·대규모 자본 투자는 모두 장치 공업의 핵심 특징입니다.'},
  {type:'mc_hard',fmt:'흐름도 완성형',q:'다음 철강 공업의 생산 흐름도에서 ㉠, ㉡에 들어갈 내용이 바르게 짝지어진 것은?',htmlContent:`<div class="hq-arrow-flow"><div class="hq-flow-blank">( ㉠ )</div><div class="hq-flow-arrow">→</div><div class="hq-flow-box">제강<br><span style="font-size:0.72rem;color:var(--text-muted);">불순물 제거, 강철 생산</span></div><div class="hq-flow-arrow">→</div><div class="hq-flow-blank">( ㉡ )</div></div><div class="hq-box" style="margin-top:8px;">㉠의 결과물: 쇳물(선철)<br>㉡의 결과물: 강판(슬래브), 봉강 등</div>`,choices:['㉠ 압연 — ㉡ 제선','㉠ 제선 — ㉡ 압연','㉠ 제강 — ㉡ 제선','㉠ 압연 — ㉡ 제강','㉠ 제선 — ㉡ 제강'],answer:1,exp:'제선(용광로→쇳물) → 제강(불순물 제거→강철) → 압연(롤러로 형태 성형). ㉠=제선, ㉡=압연입니다.'},
  {type:'mc_hard',fmt:'분류 판단형',q:'다음 A~E를 경공업과 중화학 공업으로 분류할 때, 같은 그룹으로 묶인 것은?',htmlContent:`<div class="hq-table-wrap"><table class="hq-table"><thead><tr><th>산업</th><th>주요 특징</th></tr></thead><tbody><tr><td>A. 섬유 공업</td><td>노동 집약적, 소비재 생산</td></tr><tr><td>B. 조선 공업</td><td>주문 생산, 노동 집약적, 대형 선박 제조</td></tr><tr><td>C. 식품 공업</td><td>농업과 연계, 소비재 생산</td></tr><tr><td>D. 자동차 공업</td><td>종합 조립 산업, 전후방 연쇄효과 큼</td></tr><tr><td>E. 인쇄 공업</td><td>다양한 판 방식, 출판·포장 등에 활용</td></tr></tbody></table></div>`,choices:['경공업: A,B,C / 중화학: D,E','경공업: A,C,E / 중화학: B,D','경공업: A,B,E / 중화학: C,D','경공업: C,D,E / 중화학: A,B','경공업: A,D / 중화학: B,C,E'],answer:1,exp:'경공업: 섬유(A), 식품(C), 인쇄(E) — 부피 작고 노동 집약적 소비재. 중화학 공업: 조선(B), 자동차(D) — 대규모 자본이 필요한 산업.'},
  {type:'mc_hard',fmt:'조건 추론형',q:'다음 조건을 모두 만족하는 산업 분류 체계의 이론가와 분류 기준을 옳게 연결한 것은?',htmlContent:`<div class="hq-box"><strong>조건 1.</strong> 산업을 크게 세 가지 차수(次數)로 나눈다.<br><strong>조건 2.</strong> 1차는 농·임·수산업, 2차는 제조업, 3차는 서비스업이다.<br><strong>조건 3.</strong> 산업 구조 고도화의 흐름을 설명하는 데 활용된다.</div>`,choices:['호프만 — 생산재와 소비재 산업으로 분류','클라크 — 1·2·3차 산업으로 분류','베버 — 운송비·노동비·집적이익 기준 분류','호프만 — 1·2·3차 산업으로 분류','클라크 — 생산재와 소비재 산업으로 분류'],answer:1,exp:'클라크는 산업을 1·2·3차 산업으로 분류한 이론가입니다. 호프만은 생산재/소비재로, 베버는 입지론으로 분류합니다.'},
  {type:'mc_hard',fmt:'빠진 연결고리형',q:'다음 산업 발전 흐름에서 ㉠에 들어갈 내용으로 가장 적절한 것은?',htmlContent:`<div class="hq-arrow-flow"><div class="hq-flow-box">고대<br><span style="font-size:0.72rem;color:var(--text-muted);">가내 수공업<br>자급자족</span></div><div class="hq-flow-arrow">→</div><div class="hq-flow-box">중세<br><span style="font-size:0.72rem;color:var(--text-muted);">길드 제도<br>장인 중심</span></div><div class="hq-flow-arrow">→</div><div class="hq-flow-blank">( ㉠ )</div><div class="hq-flow-arrow">→</div><div class="hq-flow-box">현대<br><span style="font-size:0.72rem;color:var(--text-muted);">지식·정보<br>소프트화</span></div></div>`,choices:['첨단 산업 사회 — 6T 기술 중심','근대 산업 사회 — 공장제도 확립, 대량 생산, 2차 산업 급성장','농업 중심 사회 — 1차 산업 비중 확대','서비스 중심 사회 — 3차 산업 급성장','공영 공업 사회 — 국가 주도 중화학 공업 육성'],answer:1,exp:'고대(가내수공업) → 중세(길드) → 근대 산업혁명(공장제도·대량생산·2차 산업 급성장) → 현대(지식·정보·소프트화) 순서입니다.'},
  {type:'mc_hard',fmt:'적용·반박형',q:'다음 주장에 대한 반박으로 가장 적절한 것은?',htmlContent:`<div class="hq-box"><div class="hq-box-title">학생의 주장</div>"조선 공업과 자동차 공업은 둘 다 중화학 공업에 속하고 수많은 부품을 조립하는 방식이므로, 두 산업의 특징은 완전히 동일하다고 볼 수 있다."</div>`,choices:['자동차 공업은 중화학 공업에 해당하지 않으므로 주장이 틀렸다','조선 공업은 주문 생산 방식이 주를 이루는 반면, 자동차 공업은 표준화된 대량 생산이 중심이므로 동일하지 않다','두 산업 모두 전후방 연쇄 효과가 동일하게 크므로 주장이 옳다','자동차 공업이 더 많은 부품을 사용하므로 두 산업은 다르다','조선 공업이 경공업에 해당하므로 두 산업을 같다고 볼 수 없다'],answer:1,exp:'두 산업 모두 조립 산업·중화학 공업이지만, 자동차는 표준화된 대량 생산, 조선은 고객 맞춤 주문 생산 방식이라는 핵심 차이가 있습니다.'},
  {type:'mc_hard',fmt:'인과 관계 분석형',q:'다음 현상의 원인으로 가장 적절한 것은?',htmlContent:`<div class="hq-box"><div class="hq-box-title">현상</div>우리나라의 포항, 광양, 울산, 거제 등의 도시에는 철강 공업, 자동차 공업, 조선 공업 등 중화학 공업 단지가 주로 해안가에 집중되어 있다.</div>`,choices:['해안 지역은 기후가 온화하여 근로자 생활에 유리하기 때문이다','원료를 수입하고 완성품을 수출하기 위한 운송 비용 절감이 유리하기 때문이다','해안 지역의 토지 가격이 내륙보다 저렴하기 때문이다','해안 지역에 풍부한 노동력이 집중되어 있기 때문이다','정부의 해안 개발 정책에 따른 강제적 배치 때문이다'],answer:1,exp:'중화학 공업은 원자재 수입과 제품 수출의 비중이 크기 때문에 항구(임해 지역)에 위치해야 운송비를 최소화할 수 있습니다.'},
  {type:'mc_hard',fmt:'개념 비교형',q:'석유 화학 공업과 정밀 화학 공업을 비교한 내용으로 옳은 것은?',htmlContent:`<div class="hq-table-wrap"><table class="hq-table"><thead><tr><th>구분</th><th>석유 화학 공업</th><th>정밀 화학 공업</th></tr></thead><tbody><tr><td>원료</td><td>?</td><td>석유 화학 제품</td></tr><tr><td>주요 생산품</td><td>에틸렌, 프로필렌 등</td><td>?</td></tr><tr><td>성격</td><td>기초 원료 공급</td><td>고부가가치 최종 제품</td></tr></tbody></table></div>`,choices:['석유 화학 원료는 천연가스이며, 정밀 화학 생산품은 강철이다','석유 화학 원료는 나프타(석유)이며, 정밀 화학 생산품은 의약품·화장품·염료 등이다','석유 화학 원료는 철광석이며, 정밀 화학 생산품은 합성섬유이다','석유 화학 원료는 나프타이며, 정밀 화학 생산품은 에틸렌·프로필렌이다','석유 화학 원료는 석탄이며, 정밀 화학 생산품은 나프타이다'],answer:1,exp:'석유 화학 공업의 원료는 나프타(석유)이며, 이를 가공한 제품을 원료로 받아 의약품·화장품·염료 등을 만드는 것이 정밀 화학 공업입니다.'},
  {type:'mc_hard',fmt:'시대적 흐름 파악형',q:'다음 우리나라 산업 발달의 흐름에서 ㉠, ㉡에 들어갈 내용이 바르게 연결된 것은?',htmlContent:`<div class="hq-arrow-flow"><div class="hq-flow-box">1960년대<br><span style="font-size:0.72rem;color:var(--text-muted);">( ㉠ ) 중심<br>수출 주도 성장</span></div><div class="hq-flow-arrow">→</div><div class="hq-flow-box">1970년대~<br><span style="font-size:0.72rem;color:var(--text-muted);">( ㉡ ) 중심<br>산업 고도화</span></div><div class="hq-flow-arrow">→</div><div class="hq-flow-box">1990년대~<br><span style="font-size:0.72rem;color:var(--text-muted);">전자·반도체<br>고부가가치 산업</span></div></div>`,choices:['㉠ 중화학 공업 — ㉡ 경공업','㉠ 경공업 — ㉡ 중화학 공업','㉠ 첨단 공업 — ㉡ 경공업','㉠ 경공업 — ㉡ 첨단 공업','㉠ 농업 — ㉡ 경공업'],answer:1,exp:'1960년대 경공업(섬유·신발) → 1970년대 이후 중화학 공업(철강·자동차·조선) → 1990년대 이후 전자·반도체 순으로 산업이 고도화되었습니다.'},
  {type:'mc_hard',fmt:'신소재 적용형',q:'다음 각 신소재와 그 특징·활용이 바르게 연결되지 않은 것은?',htmlContent:`<div class="hq-box">① 초전도 재료 — 특정 저온에서 전기 저항 0, 강력한 자기장 형성 가능<br>② 형상 기억 합금 — 변형 후 특정 온도에서 원래 형태로 복원<br>③ 파인 세라믹스 — 고온·부식·충격에 강한 세라믹 소재<br>④ 나노 소재 — 10억 분의 1미터 단위 초미세 구조로 고성능 특성 부여<br>⑤ 합성 섬유 — 고온에서 전기 저항이 0이 되는 특성을 가진 소재</div>`,choices:['①','②','③','④','⑤'],answer:4,exp:'⑤가 틀렸습니다. 합성 섬유(나일론, 폴리에스테르)는 강도가 높고 구김이 적은 섬유 소재이며, 전기 저항이 0이 되는 것은 초전도 재료의 특징입니다.'},
  {type:'mc_hard',fmt:'6T 적용 판단형',q:'다음 각 사례에 해당하는 6T 기술이 바르게 연결된 것은?',htmlContent:`<div class="hq-table-wrap"><table class="hq-table"><thead><tr><th>사례</th><th>해당 기술</th></tr></thead><tbody><tr><td>A. 유전자 편집으로 신약 개발</td><td>(가)</td></tr><tr><td>B. 인공위성을 통한 재해 예측</td><td>(나)</td></tr><tr><td>C. 게임·애니메이션·디지털 영상 제작</td><td>(다)</td></tr><tr><td>D. 태양광 발전 및 폐기물 재활용 기술</td><td>(라)</td></tr></tbody></table></div>`,choices:['A-IT, B-ST, C-CT, D-ET','A-BT, B-ST, C-CT, D-ET','A-BT, B-NT, C-IT, D-ET','A-NT, B-ST, C-BT, D-CT','A-BT, B-IT, C-CT, D-NT'],answer:1,exp:'A(유전자 편집·신약)=BT, B(인공위성·재해 예측)=ST, C(게임·영상)=CT, D(태양광·재활용)=ET'},
  {type:'mc_hard',fmt:'인쇄 방식 종합 판단형',q:'다음 인쇄 방식에 대한 설명 중 옳은 것끼리 묶인 것은?',htmlContent:`<div class="hq-box">ㄱ. 볼록판 인쇄는 판의 높은 부분에 잉크를 묻혀 도장·활판 인쇄 등에 활용된다.<br>ㄴ. 오목판(그라비어) 인쇄는 물과 기름의 반발 원리를 이용한다.<br>ㄷ. 평판 인쇄(오프셋)는 신문·잡지·교과서 인쇄에 가장 널리 활용된다.<br>ㄹ. 공판 인쇄는 판의 구멍을 통해 잉크를 통과시키는 방식으로 티셔츠 프린팅에 활용된다.</div>`,choices:['ㄱ, ㄴ, ㄷ, ㄹ 모두','ㄱ, ㄷ, ㄹ','ㄴ, ㄷ, ㄹ','ㄱ, ㄴ','ㄷ, ㄹ'],answer:1,exp:'ㄴ이 틀렸습니다. 물과 기름의 반발 원리는 평판 인쇄(오프셋)의 특징입니다. 오목판은 홈에 잉크를 채우는 방식입니다. ㄱ, ㄷ, ㄹ은 옳습니다.'},
  {type:'mc_hard',fmt:'분류 체계 판단형',q:'다음 제품 분류 기준과 그 설명이 바르게 짝지어진 것은?',htmlContent:`<div class="hq-table-wrap"><table class="hq-table"><thead><tr><th>분류 기준</th><th>설명</th></tr></thead><tbody><tr><td>㉠ 내구성에 따른 분류</td><td>?</td></tr><tr><td>㉡ 사용 목적에 따른 분류</td><td>?</td></tr></tbody></table></div><div class="hq-box" style="margin-top:8px;">A. 소비재와 생산재로 나뉜다<br>B. 내구재와 비내구재로 나뉜다</div>`,choices:['㉠-A, ㉡-B','㉠-B, ㉡-A','㉠-A, ㉡-A','㉠-B, ㉡-B','두 기준 모두 동일하다'],answer:1,exp:'내구성에 따른 분류는 내구재/비내구재(B), 사용 목적에 따른 분류는 소비재/생산재(A)로 나뉩니다.'},
  {type:'mc_hard',fmt:'사례 분류형',q:'다음 A~D 제품을 제품 분류표에 바르게 배치한 것은?',htmlContent:`<div class="hq-box">A. 카메라 (특정 브랜드 고집, 비교적 비쌈)<br>B. 신문 (매일 구매, 저렴, 비교 없이 구입)<br>C. 냉장고 (여러 브랜드 비교 후 구입)<br>D. 생산 공장의 선반 기계 (생산에 사용)</div>`,choices:['A-전문품, B-편의품, C-선매품, D-자본재','A-선매품, B-전문품, C-편의품, D-소모품','A-전문품, B-선매품, C-편의품, D-소모품','A-편의품, B-선매품, C-전문품, D-자본재','A-선매품, B-편의품, C-전문품, D-재료및부품'],answer:0,exp:'A카메라=전문품(특정 브랜드 고집), B신문=편의품(일상적 구매), C냉장고=선매품(비교 구매), D선반기계=자본재(생산용 기계)'},
  {type:'mc_hard',fmt:'종합 판단형',q:'다음 표의 ㉠~㉤ 중 옳지 않은 것은?',htmlContent:`<div class="hq-table-wrap"><table class="hq-table"><thead><tr><th>분류</th><th>설명</th><th>예시</th></tr></thead><tbody><tr><td>㉠ 편의품</td><td>구매 쉽고 자주 구입</td><td>식료품, 신문</td></tr><tr><td>㉡ 선매품</td><td>여러 제품 비교 후 구입</td><td>가구, 의류, 가전제품</td></tr><tr><td>㉢ 전문품</td><td>특정 브랜드 위해 특별한 노력</td><td>카메라, 음향 기기</td></tr><tr><td>㉣ 자본재</td><td>생산용 기계·장비, 비내구재</td><td>생산 장비, 기계류</td></tr><tr><td>㉤ 소모품</td><td>생산 과정에서 소비되는 용품</td><td>사무 용품, 청소 용품</td></tr></tbody></table></div>`,choices:['㉠','㉡','㉢','㉣','㉤'],answer:3,exp:'㉣이 틀렸습니다. 자본재는 생산용 기계·장비로 내구재에 속합니다. "비내구재"라고 설명한 것이 오류입니다.'},
  {type:'mc_hard',fmt:'추론형',q:'다음 조건을 모두 만족하는 제품 분류로 가장 적절한 것은?',htmlContent:`<div class="hq-box"><strong>조건 1.</strong> 사용 목적에 따른 분류에서 생산재에 속한다.<br><strong>조건 2.</strong> 내구성에 따른 분류에서 내구재에 속한다.<br><strong>조건 3.</strong> 다른 제품을 만드는 데 사용하는 기계·장비이다.</div>`,choices:['편의품','선매품','자본재','소모품','비내구재'],answer:2,exp:'자본재는 생산재이면서 내구재에 속하고, 다른 제품을 만드는 데 사용하는 기계·장비류입니다. 세 조건을 모두 만족합니다.'},
  {type:'mc_hard',fmt:'오류 찾기형',q:'다음 제품 분류에 대한 설명 중 옳지 않은 것은?',htmlContent:`<div class="hq-box">① 비내구재는 소비가 빠르고 단기간에 사용되는 제품이다.<br>② 내구재는 오래 사용할 수 있는 제품으로 가전제품, 자동차, 가구 등이 포함된다.<br>③ 전문품은 소비자가 여러 제품을 비교 분석하여 구입하는 제품이다.<br>④ 편의품은 구매가 쉽고 일상적으로 자주 구입하는 제품이다.<br>⑤ 자본재는 생산을 위한 기계·장비이며 동시에 내구재에도 속한다.</div>`,choices:['①','②','③','④','⑤'],answer:2,exp:'③이 틀렸습니다. 여러 제품을 비교 분석하여 구입하는 것은 선매품의 특징입니다. 전문품은 특정 브랜드를 위해 특별한 노력을 기울여 구입하는 제품입니다.'},
  {type:'mc_hard',fmt:'공통점 찾기형',q:'다음 중 소비재와 생산재의 공통점으로 가장 적절한 것은?',htmlContent:`<div class="hq-two-col"><div class="hq-col-card"><div class="hq-col-label">소비재</div>편의품, 선매품, 전문품<br>(최종 소비 목적)</div><div class="hq-col-card"><div class="hq-col-label">생산재</div>재료·부품, 자본재, 소모품<br>(생산 활동 목적)</div></div>`,choices:['둘 다 비내구재에만 속한다','둘 다 제품의 사용 목적에 따른 분류에 포함된다','둘 다 편의품의 하위 분류이다','둘 다 내구재에만 속한다','둘 다 클라크의 산업 분류에서 2차 산업에 해당한다'],answer:1,exp:'소비재와 생산재는 모두 제품을 사용 목적에 따라 분류할 때 나타나는 두 가지 대분류입니다.'},
  {type:'mc_hard',fmt:'적용 판단형',q:'다음 A씨의 구매 상황에서 A씨가 구입한 제품의 분류로 가장 옳은 것은?',htmlContent:`<div class="hq-box"><div class="hq-box-title">상황</div>A씨는 평소 좋아하는 특정 브랜드의 카메라를 구입하기 위해 3개월 동안 돈을 모으고, 멀리 있는 전문 매장까지 방문하였다.</div>`,choices:['편의품','선매품','전문품','비내구재','소모품'],answer:2,exp:'특정 브랜드를 위해 특별한 노력(돈 모으기, 전문 매장 방문)을 들여 구입하는 제품은 전문품입니다.'},
  {type:'mc_hard',fmt:'경제적 역할 분석형',q:'다음 중 자동차 공업의 전후방 연쇄 효과에 해당하지 않는 것은?',htmlContent:`<div class="hq-box">자동차 공업은 약 2~3만 개의 부품이 필요한 종합 조립 산업으로, 관련 산업에 미치는 파급 효과가 매우 크다.</div>`,choices:['자동차 생산을 위해 철강·유리·고무 산업이 함께 성장한다','자동차 보급으로 주유소·정비소·보험업 등 서비스 산업이 발달한다','자동차 공장 건설로 지역 고용이 증가하고 지역 경제가 활성화된다','자동차 수출 증가로 국가 외화 수입이 늘어난다','자동차 공업이 발달하면 조선 공업의 주문 생산 방식이 표준화된다'],answer:4,exp:'조선 공업의 주문 생산 방식은 자동차 공업과 무관합니다. 자동차 공업의 전후방 연쇄 효과는 철강·유리·고무(후방)와 정비·보험·주유(전방)에 나타납니다.'},
  {type:'mc_hard',fmt:'분류 적용형',q:'공장에서 제품 생산에 사용하는 "원자재(면화, 강판 등)"와 "생산 기계(로봇 팔, 선반)"의 제품 분류로 옳은 것은?',htmlContent:`<div class="hq-two-col"><div class="hq-col-card"><div class="hq-col-label">원자재 (면화, 강판 등)</div>다른 제품의 원료로 투입됨<br>소비 후 사라짐</div><div class="hq-col-card"><div class="hq-col-label">생산 기계 (로봇 팔, 선반)</div>생산에 반복 사용<br>오래 사용 가능</div></div>`,choices:['원자재-자본재, 생산기계-소모품','원자재-재료및부품, 생산기계-자본재','원자재-소모품, 생산기계-재료및부품','원자재-편의품, 생산기계-선매품','원자재-내구재, 생산기계-비내구재'],answer:1,exp:'원자재(면화, 강판)는 재료 및 부품, 생산 기계(로봇 팔, 선반)는 자본재로 분류됩니다.'},
  {type:'mc_hard',fmt:'상황 판단형',q:'다음 A 공장의 입지 결정 과정에서 적용된 이론으로 가장 적절한 것은?',htmlContent:`<div class="hq-box">A 공장은 입지를 결정하기 위해 세 가지 요소를 분석했다.<br><br>1. 원료 산지에서 시장까지의 운송비 비교<br>2. 지역별 노동력 임금 차이로 인한 비용 절감 가능성<br>3. 인근 기업들과의 집적으로 얻을 수 있는 이익<br><br>→ 이 세 요소를 종합 분석하여 총 생산비가 가장 낮은 지점을 최적 입지로 선택</div>`,choices:['베버(Weber)의 최소 비용 이론','클라크(Clark)의 산업 구조 이론','호프만(Hoffmann)의 생산재/소비재 분류 이론','적환지 입지 이론','시장 지향형 입지 이론'],answer:0,exp:'운송비, 노동비, 집적 이익 세 가지를 종합하여 최소 생산비 지점을 최적 입지로 보는 것은 베버(Weber)의 최소 비용 이론입니다.'},
  {type:'mc_hard',fmt:'옳고 그름 판단형',q:'다음 보기 중 경공업의 특징으로 옳은 것을 모두 고른 것은?',htmlContent:`<div class="hq-box">ㄱ. 노동 집약적 성격이 강하며 적은 자본으로 시작 가능하다.<br>ㄴ. 주로 소비재(옷, 신발 등)를 생산하며 고용 창출 효과가 크다.<br>ㄷ. 우리나라는 1970년대 이후 경공업 비중이 더욱 확대되었다.<br>ㄹ. 최근에는 기능성 소재, 친환경, ICT 융합 등 고부가가치 방향으로 변화하고 있다.</div>`,choices:['ㄱ, ㄴ, ㄷ, ㄹ 모두','ㄱ, ㄴ, ㄹ','ㄴ, ㄷ, ㄹ','ㄱ, ㄷ','ㄴ, ㄹ'],answer:1,exp:'ㄷ이 틀렸습니다. 우리나라는 1970년대 이후 경공업에서 중화학 공업 중심으로 이동했습니다. ㄱ, ㄴ, ㄹ은 옳습니다.'},
  {type:'mc_hard',fmt:'선매품·전문품 비교형',q:'선매품과 전문품의 차이점으로 가장 적절한 것은?',htmlContent:`<div class="hq-two-col"><div class="hq-col-card"><div class="hq-col-label">선매품</div>여러 제품을 비교 분석하여 구입<br>예: 가구, 의류, 가전제품</div><div class="hq-col-card"><div class="hq-col-label">전문품</div>특정 브랜드를 위해 특별한 노력<br>예: 카메라, 자동차, 음향 기기</div></div>`,choices:['선매품은 생산재, 전문품은 소비재이다','선매품은 여러 대안을 비교하고, 전문품은 특정 제품·브랜드에 대한 강한 선호가 있다','선매품은 비내구재, 전문품은 내구재이다','선매품은 자주 구매하고, 전문품은 드물게 구매하는 점이 다르다','선매품과 전문품은 둘 다 편의품의 하위 분류이다'],answer:1,exp:'선매품은 소비자가 여러 대안을 비교 분석하는 과정이 핵심이고, 전문품은 특정 브랜드나 제품에 대한 강한 선호와 특별한 구매 노력이 핵심입니다.'},
  {type:'mc_hard',fmt:'최종 종합형',q:'다음 표에서 설명이 옳은 항목만 고른 것은?',htmlContent:`<div class="hq-table-wrap"><table class="hq-table"><thead><tr><th>번호</th><th>개념</th><th>설명</th></tr></thead><tbody><tr><td>㉠</td><td>기초 공업</td><td>자동차·조선 등 다른 공업의 바탕이 되는 원료·자재 생산</td></tr><tr><td>㉡</td><td>공영 공업</td><td>민간 기업이 이익 극대화를 위해 자유롭게 운영하는 공업</td></tr><tr><td>㉢</td><td>산업 소프트화</td><td>하드웨어보다 서비스·정보·지식의 가치 비중이 높아지는 현상</td></tr><tr><td>㉣</td><td>HACCP</td><td>식품의 원재료부터 최종 소비까지 위해요소를 차단하는 기준</td></tr><tr><td>㉤</td><td>정밀 화학 공업</td><td>나프타를 원료로 에틸렌·프로필렌 등 기초 원료를 생산</td></tr></tbody></table></div>`,choices:['㉠, ㉡, ㉢','㉠, ㉢, ㉣','㉡, ㉣, ㉤','㉠, ㉡, ㉤','㉢, ㉣, ㉤'],answer:1,exp:'㉡ 틀림(공영 공업은 국가·지자체가 공공 이익을 위해 운영), ㉤ 틀림(나프타→에틸렌·프로필렌은 석유 화학 공업). ㉠✓, ㉢✓, ㉣✓'},
];

// 동적 문제 배열 생성 함수
// ════════════════════════════════════════════════
function getHardQuestions() {
  // 정적 문제 + 동적 변형 문제 합체
  const dynamic = [
    makeDynDialogQ(),
    makeDynTextErrorQ(),
    makeDynTableErrorQ(),
  ];
  return shuffle([...HARD_QUESTIONS_STATIC, ...dynamic]);
}

function getExpertQuestions() {
  return shuffle([...EXPERT_QUESTIONS_STATIC]);
}

// ════════════════════════════════════════════════
// 상태
// ════════════════════════════════════════════════
let selectedQuestions=[],currentIdx=0,score=0,answered=false,currentMode='normal';

function selectDiff(mode){
  currentMode=mode;
  ['normal','hard','expert'].forEach(m=>{
    document.getElementById('btn-diff-'+m).className='diff-btn'+(m===mode?' selected-'+m:'');
  });
  const btn=document.getElementById('btn-start-main');
  const labels={normal:'📖 노말 시작하기 →',hard:'🔥 하드 시작하기 →',expert:'⚡ 익스퍼트 시작하기 →'};
  const cls={normal:'btn-start',hard:'btn-start hard-mode',expert:'btn-start expert-mode'};
  btn.textContent=labels[mode];btn.className=cls[mode];
}

function startQuiz(forcedMode){
  if(forcedMode)selectDiff(forcedMode);

  let pool;
  if(currentMode==='normal') pool=shuffle([...NORMAL_QUESTIONS]).slice(0,20);
  else if(currentMode==='hard') pool=getHardQuestions().slice(0,20);
  else pool=getExpertQuestions().slice(0,20);

  selectedQuestions=pool;
  currentIdx=0;score=0;

  document.getElementById('start-screen').style.display='none';
  document.getElementById('result-screen').style.display='none';
  document.getElementById('quiz-screen').style.display='block';
  document.getElementById('live-score').textContent=0;

  const fill=document.getElementById('progress-fill');
  fill.className='progress-bar-fill'+(currentMode==='hard'?' hard-fill':currentMode==='expert'?' expert-fill':'');

  const qs=document.getElementById('quiz-screen');
  qs.className=currentMode==='hard'?'hard-mode-active':currentMode==='expert'?'expert-mode-active':'';

  renderQuestion();
}

function renderQuestion(){
  answered=false;
  const q=selectedQuestions[currentIdx];
  const total=selectedQuestions.length;

  document.getElementById('cur-q').textContent=currentIdx+1;
  document.getElementById('progress-fill').style.width=((currentIdx+1)/total*100)+'%';
  document.getElementById('explanation').style.display='none';
  document.getElementById('btn-next').style.display='none';

  const qCard=document.getElementById('q-card');
  const qType=document.getElementById('q-type');
  const qText=document.getElementById('q-text');
  const qHtml=document.getElementById('q-html-content');
  const btnNext=document.getElementById('btn-next');

  qCard.className='question-card'+(currentMode==='hard'?' hard-card':currentMode==='expert'?' expert-card':'');
  btnNext.className='btn-next'+(currentMode==='hard'?' hard-next':currentMode==='expert'?' expert-next':'');

  if(q.type==='mc') qType.innerHTML='✏️ 객관식';
  else if(q.type==='sa') qType.innerHTML='📝 단답형';
  else if(currentMode==='expert') qType.innerHTML=`⚡ <span class="expert-badge-inline">EXPERT</span> &nbsp;<span class="fmt-tag">${q.fmt}</span>`;
  else qType.innerHTML=`🔥 <span class="hard-badge-inline">HARD</span> &nbsp;<span class="fmt-tag">${q.fmt}</span>`;

  qText.textContent=q.q;
  qHtml.innerHTML=q.htmlContent||'';

  const area=document.getElementById('choices-area');
  area.innerHTML='';

  if(q.type==='mc'||q.type==='mc_hard'){
    const{shuffledChoices,newAnswerIdx}=pickMC(q.choices,q.answer);
    const div=document.createElement('div');div.className='choices';
    ['①','②','③','④'].forEach((lbl,i)=>{
      if(i>=shuffledChoices.length)return;
      const btn=document.createElement('button');btn.className='choice-btn';
      btn.innerHTML=`<span class="choice-num">${lbl}</span><span>${shuffledChoices[i]}</span>`;
      btn.onclick=()=>handleMC(i,btn,div,newAnswerIdx,q);div.appendChild(btn);
    });
    area.appendChild(div);
  } else {
    const wrap=document.createElement('div');wrap.className='short-answer-wrap';
    const row=document.createElement('div');row.className='short-input-row';
    const inp=document.createElement('input');inp.className='short-input';inp.type='text';inp.placeholder='정답을 입력하세요';
    const submitBtn=document.createElement('button');submitBtn.className='btn-submit';submitBtn.textContent='제출';
    const hint=document.createElement('div');hint.className='sa-hint';
    const doSubmit=()=>submitSA(inp,submitBtn,hint,q);
    inp.onkeydown=e=>{if(e.key==='Enter')doSubmit();};submitBtn.onclick=doSubmit;
    row.appendChild(inp);row.appendChild(submitBtn);wrap.appendChild(row);wrap.appendChild(hint);area.appendChild(wrap);
    setTimeout(()=>inp.focus(),100);
  }
}

function handleMC(idx,btn,div,correctIdx,q){
  if(answered)return;answered=true;
  const btns=div.querySelectorAll('.choice-btn');btns.forEach(b=>b.disabled=true);
  const isCorrect=idx===correctIdx;
  btns[correctIdx].classList.add('correct');
  if(!isCorrect)btn.classList.add('wrong');
  if(isCorrect)score++;
  document.getElementById('live-score').textContent=score;
  showExp(q.exp);
}

function submitSA(inp,submitBtn,hint,q){
  if(answered)return;const val=inp.value.trim();if(!val)return;
  answered=true;inp.disabled=true;submitBtn.disabled=true;
  const isCorrect=checkSA(val,q.answers);
  if(isCorrect){inp.classList.add('correct');hint.className='sa-hint correct-hint';hint.textContent='✅ 정답입니다!';score++;}
  else{inp.classList.add('wrong');hint.className='sa-hint wrong-hint';hint.textContent=`❌ 오답 — 정답: ${q.answers[0]}`;}
  document.getElementById('live-score').textContent=score;showExp(q.exp);
}

function showExp(text){
  const el=document.getElementById('explanation');
  document.getElementById('exp-text').textContent=text;el.style.display='block';
  const nextBtn=document.getElementById('btn-next');nextBtn.style.display='block';
  nextBtn.textContent=currentIdx<selectedQuestions.length-1?'다음 문제 →':'결과 보기 🏁';
  nextBtn.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function nextQuestion(){
  currentIdx++;
  if(currentIdx>=selectedQuestions.length)showResult();
  else{renderQuestion();window.scrollTo({top:0,behavior:'smooth'});}
}

function showResult(){
  document.getElementById('quiz-screen').style.display='none';
  const rs=document.getElementById('result-screen');rs.style.display='flex';
  const total=selectedQuestions.length;const pct=Math.round(score/total*100);
  document.getElementById('result-score-num').textContent=score;
  const sn=document.getElementById('result-score-num');
  sn.className='score-num'+(currentMode==='hard'?' hard-score':currentMode==='expert'?' expert-score':'');
  document.getElementById('cnt-correct').textContent=score;
  document.getElementById('cnt-wrong').textContent=total-score;
  const db=document.getElementById('result-diff-badge');
  const labels={normal:'📖 노말 모드',hard:'🔥 하드 모드',expert:'⚡ 익스퍼트 모드'};
  db.className='result-diff-badge '+currentMode;db.textContent=labels[currentMode];
  setTimeout(()=>{
    document.getElementById('bar-correct').style.width=(score/total*100)+'%';
    document.getElementById('bar-wrong').style.width=((total-score)/total*100)+'%';
  },200);
  let emoji,title,detail;
  if(pct>=90){emoji='🏆';title='완벽해요!';detail=`${total}문제 중 ${score}문제 정답 (${pct}%)\n공업 단원 완전 정복!`;}
  else if(pct>=70){emoji='😊';title='잘했어요!';detail=`${total}문제 중 ${score}문제 정답 (${pct}%)\n조금만 더 보강하면 만점!`;}
  else if(pct>=50){emoji='📖';title='더 공부해요!';detail=`${total}문제 중 ${score}문제 정답 (${pct}%)\n오답 노트를 꼭 만들어보세요.`;}
  else{emoji='💪';title='다시 도전!';detail=`${total}문제 중 ${score}문제 정답 (${pct}%)\n핵심 개념을 다시 복습해요.`;}
  document.getElementById('result-emoji').textContent=emoji;
  document.getElementById('result-title').textContent=title;
  document.getElementById('result-detail').textContent=detail;
}

function goHome(){
  document.getElementById('result-screen').style.display='none';
  document.getElementById('start-screen').style.display='flex';
}

selectDiff('normal');
</script>
