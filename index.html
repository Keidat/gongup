<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>공업 단원 시험 대비 퀴즈</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Black+Han+Sans&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --card: #1c2230;
    --border: #30363d;
    --accent: #58a6ff;
    --accent2: #f78166;
    --accent3: #56d364;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --correct: #1a4731;
    --correct-border: #56d364;
    --wrong: #4a1c1c;
    --wrong-border: #f85149;
    --yellow: #e3b341;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    padding: 0;
  }

  /* ── 시작 화면 ── */
  #start-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
    position: relative;
    overflow: hidden;
  }

  #start-screen::before {
    content: '';
    position: absolute;
    top: -200px; left: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(88,166,255,0.12) 0%, transparent 70%);
    pointer-events: none;
  }

  #start-screen::after {
    content: '';
    position: absolute;
    bottom: -150px; right: -100px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(247,129,102,0.10) 0%, transparent 70%);
    pointer-events: none;
  }

  .start-badge {
    background: rgba(88,166,255,0.15);
    border: 1px solid rgba(88,166,255,0.35);
    color: var(--accent);
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    padding: 0.35rem 1rem;
    border-radius: 100px;
    margin-bottom: 1.5rem;
    text-transform: uppercase;
  }

  .start-title {
    font-family: 'Black Han Sans', sans-serif;
    font-size: clamp(2.4rem, 6vw, 4rem);
    text-align: center;
    line-height: 1.15;
    margin-bottom: 0.8rem;
    background: linear-gradient(135deg, #e6edf3 0%, #58a6ff 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .start-sub {
    color: var(--text-muted);
    font-size: 1rem;
    text-align: center;
    margin-bottom: 2.5rem;
    line-height: 1.7;
  }

  .info-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1rem;
    margin-bottom: 2.5rem;
    width: 100%;
    max-width: 480px;
  }

  .info-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem;
    text-align: center;
  }

  .info-card .num {
    font-size: 1.8rem;
    font-weight: 900;
    color: var(--accent);
    display: block;
  }

  .info-card .lbl {
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-top: 0.2rem;
  }

  .btn-start {
    background: linear-gradient(135deg, #58a6ff, #388bfd);
    color: #fff;
    border: none;
    padding: 1rem 3rem;
    font-size: 1.1rem;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    border-radius: 12px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 24px rgba(88,166,255,0.3);
  }

  .btn-start:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(88,166,255,0.45);
  }

  /* ── 퀴즈 화면 ── */
  #quiz-screen {
    display: none;
    max-width: 720px;
    margin: 0 auto;
    padding: 2rem 1.5rem 5rem;
  }

  .quiz-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.5rem;
  }

  .quiz-counter {
    font-size: 0.85rem;
    color: var(--text-muted);
    font-weight: 700;
    letter-spacing: 0.05em;
  }

  .quiz-counter span {
    color: var(--accent);
    font-size: 1.1rem;
  }

  .score-badge {
    background: rgba(86,211,100,0.15);
    border: 1px solid rgba(86,211,100,0.3);
    color: var(--accent3);
    font-size: 0.8rem;
    font-weight: 700;
    padding: 0.3rem 0.8rem;
    border-radius: 100px;
  }

  .progress-bar-wrap {
    height: 4px;
    background: var(--border);
    border-radius: 99px;
    margin-bottom: 2rem;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #58a6ff, #56d364);
    border-radius: 99px;
    transition: width 0.4s ease;
  }

  .question-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.8rem;
    margin-bottom: 1.4rem;
    position: relative;
    overflow: hidden;
  }

  .question-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, #58a6ff, #388bfd);
  }

  .question-type {
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.8rem;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }

  .question-type::before {
    content: '';
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
  }

  .question-text {
    font-size: 1.08rem;
    font-weight: 500;
    line-height: 1.7;
    color: var(--text);
  }

  .choices {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    margin-bottom: 1.4rem;
  }

  .choice-btn {
    background: var(--surface);
    border: 1.5px solid var(--border);
    color: var(--text);
    padding: 0.9rem 1.2rem;
    border-radius: 10px;
    text-align: left;
    font-size: 0.95rem;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: flex-start;
    gap: 0.8rem;
    line-height: 1.5;
  }

  .choice-btn:hover:not(:disabled) {
    border-color: var(--accent);
    background: rgba(88,166,255,0.08);
    transform: translateX(3px);
  }

  .choice-btn .choice-num {
    min-width: 24px;
    height: 24px;
    border-radius: 6px;
    background: var(--border);
    color: var(--text-muted);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.78rem;
    font-weight: 700;
    flex-shrink: 0;
    margin-top: 1px;
    transition: all 0.15s;
  }

  .choice-btn:hover:not(:disabled) .choice-num {
    background: var(--accent);
    color: #fff;
  }

  .choice-btn.correct {
    background: var(--correct);
    border-color: var(--correct-border);
    color: #fff;
  }

  .choice-btn.correct .choice-num {
    background: var(--correct-border);
    color: #fff;
  }

  .choice-btn.wrong {
    background: var(--wrong);
    border-color: var(--wrong-border);
    color: #fff;
  }

  .choice-btn.wrong .choice-num {
    background: var(--wrong-border);
    color: #fff;
  }

  .choice-btn:disabled { cursor: default; }

  .explanation {
    display: none;
    background: rgba(88,166,255,0.06);
    border: 1px solid rgba(88,166,255,0.2);
    border-radius: 10px;
    padding: 1rem 1.2rem;
    font-size: 0.9rem;
    color: #a8c9f7;
    line-height: 1.7;
    margin-bottom: 1.4rem;
  }

  .explanation .ex-label {
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 0.3rem;
    display: block;
    font-size: 0.78rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .short-answer-wrap {
    display: flex;
    gap: 0.7rem;
    margin-bottom: 1.4rem;
    flex-direction: column;
  }

  .short-input-row {
    display: flex;
    gap: 0.7rem;
  }

  .short-input {
    flex: 1;
    background: var(--surface);
    border: 1.5px solid var(--border);
    color: var(--text);
    padding: 0.85rem 1rem;
    border-radius: 10px;
    font-size: 0.95rem;
    font-family: 'Noto Sans KR', sans-serif;
    outline: none;
    transition: border-color 0.15s;
  }

  .short-input:focus { border-color: var(--accent); }
  .short-input.correct { border-color: var(--correct-border); background: var(--correct); }
  .short-input.wrong { border-color: var(--wrong-border); background: var(--wrong); }

  .btn-submit {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 0.85rem 1.4rem;
    border-radius: 10px;
    font-size: 0.9rem;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: opacity 0.15s;
    white-space: nowrap;
  }

  .btn-submit:hover { opacity: 0.85; }
  .btn-submit:disabled { opacity: 0.4; cursor: default; }

  .sa-hint {
    font-size: 0.82rem;
    color: var(--text-muted);
    padding: 0 0.2rem;
  }

  .sa-hint.correct-hint { color: var(--accent3); font-weight: 700; }
  .sa-hint.wrong-hint { color: var(--accent2); }

  .btn-next {
    width: 100%;
    background: linear-gradient(135deg, #58a6ff, #388bfd);
    color: #fff;
    border: none;
    padding: 1rem;
    border-radius: 12px;
    font-size: 1rem;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: transform 0.15s, opacity 0.15s;
    display: none;
  }

  .btn-next:hover { opacity: 0.9; transform: translateY(-1px); }

  /* ── 결과 화면 ── */
  #result-screen {
    display: none;
    max-width: 600px;
    margin: 0 auto;
    padding: 3rem 1.5rem;
    text-align: center;
    min-height: 100vh;
    justify-content: center;
    flex-direction: column;
    align-items: center;
  }

  .result-emoji {
    font-size: 5rem;
    margin-bottom: 1rem;
    display: block;
    animation: bounce 0.5s ease;
  }

  @keyframes bounce {
    0% { transform: scale(0.5); opacity: 0; }
    70% { transform: scale(1.15); }
    100% { transform: scale(1); opacity: 1; }
  }

  .result-title {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 2.2rem;
    margin-bottom: 0.5rem;
  }

  .result-score {
    font-size: 3.5rem;
    font-weight: 900;
    margin: 1rem 0;
  }

  .result-score .score-num { color: var(--accent); }

  .result-detail {
    color: var(--text-muted);
    margin-bottom: 2rem;
    font-size: 0.95rem;
    line-height: 1.7;
    white-space: pre-line;
  }

  .result-bars {
    width: 100%;
    max-width: 400px;
    margin: 0 auto 2rem;
    display: flex;
    flex-direction: column;
    gap: 0.8rem;
  }

  .result-bar-row {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    font-size: 0.85rem;
  }

  .result-bar-label {
    width: 50px;
    text-align: right;
    color: var(--text-muted);
    flex-shrink: 0;
  }

  .result-bar-track {
    flex: 1;
    height: 10px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }

  .result-bar-fill-correct {
    height: 100%;
    background: var(--accent3);
    border-radius: 99px;
    transition: width 1s ease;
  }

  .result-bar-fill-wrong {
    height: 100%;
    background: var(--accent2);
    border-radius: 99px;
    transition: width 1s ease;
  }

  .result-bar-count { width: 30px; font-weight: 700; }

  .result-buttons {
    display: flex;
    gap: 0.8rem;
    width: 100%;
    max-width: 400px;
  }

  .btn-retry {
    flex: 1;
    background: linear-gradient(135deg, #58a6ff, #388bfd);
    color: #fff;
    border: none;
    padding: 0.95rem;
    border-radius: 12px;
    font-size: 0.95rem;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .btn-retry:hover { opacity: 0.85; }

  .btn-review {
    flex: 1;
    background: var(--card);
    color: var(--text);
    border: 1.5px solid var(--border);
    padding: 0.95rem;
    border-radius: 12px;
    font-size: 0.95rem;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: border-color 0.15s;
  }

  .btn-review:hover { border-color: var(--accent); }

  @media (max-width: 600px) {
    .info-grid { grid-template-columns: repeat(3,1fr); gap: 0.6rem; }
    .question-text { font-size: 0.97rem; }
    .choice-btn { font-size: 0.88rem; padding: 0.8rem 1rem; }
  }
</style>
</head>
<body>

<!-- 시작 화면 -->
<div id="start-screen">
  <div class="start-badge">📚 시험 대비 퀴즈</div>
  <h1 class="start-title">공업 단원<br>실력 점검</h1>
  <p class="start-sub">경공업 · 중화학공업 · 첨단공업<br>핵심 개념 총정리 퀴즈</p>
  <div class="info-grid">
    <div class="info-card">
      <span class="num">20</span>
      <div class="lbl">문제 수</div>
    </div>
    <div class="info-card">
      <span class="num" style="color:var(--yellow)">랜덤</span>
      <div class="lbl">출제 방식</div>
    </div>
    <div class="info-card">
      <span class="num" style="color:var(--accent3)">즉시</span>
      <div class="lbl">해설 제공</div>
    </div>
  </div>
  <button class="btn-start" onclick="startQuiz()">시험 시작하기 →</button>
</div>

<!-- 퀴즈 화면 -->
<div id="quiz-screen">
  <div class="quiz-header">
    <div class="quiz-counter">문제 <span id="cur-q">1</span> / 20</div>
    <div class="score-badge">점수: <span id="live-score">0</span>점</div>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progress-fill" style="width:5%"></div>
  </div>
  <div class="question-card">
    <div class="question-type" id="q-type">객관식</div>
    <div class="question-text" id="q-text"></div>
  </div>
  <div id="choices-area"></div>
  <div class="explanation" id="explanation">
    <span class="ex-label">💡 해설</span>
    <span id="exp-text"></span>
  </div>
  <button class="btn-next" id="btn-next" onclick="nextQuestion()">다음 문제 →</button>
</div>

<!-- 결과 화면 -->
<div id="result-screen">
  <span class="result-emoji" id="result-emoji">🎉</span>
  <h2 class="result-title" id="result-title">수고했어요!</h2>
  <div class="result-score"><span class="score-num" id="result-score-num">0</span> <span style="font-size:1.5rem;color:var(--text-muted)">/ 20</span></div>
  <p class="result-detail" id="result-detail"></p>
  <div class="result-bars">
    <div class="result-bar-row">
      <span class="result-bar-label" style="color:var(--accent3)">정답</span>
      <div class="result-bar-track"><div class="result-bar-fill-correct" id="bar-correct" style="width:0%"></div></div>
      <span class="result-bar-count" style="color:var(--accent3)" id="cnt-correct">0</span>
    </div>
    <div class="result-bar-row">
      <span class="result-bar-label" style="color:var(--accent2)">오답</span>
      <div class="result-bar-track"><div class="result-bar-fill-wrong" id="bar-wrong" style="width:0%"></div></div>
      <span class="result-bar-count" style="color:var(--accent2)" id="cnt-wrong">0</span>
    </div>
  </div>
  <div class="result-buttons">
    <button class="btn-retry" onclick="startQuiz()">다시 풀기 🔄</button>
    <button class="btn-review" onclick="goHome()">처음으로 🏠</button>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
//  문제 데이터
//  단답형(sa): answers 배열 — 첫 번째가 대표 정답(해설 표시용),
//              나머지는 허용 유사 답변
// ─────────────────────────────────────────────
const ALL_QUESTIONS = [
  // ── 객관식 ──
  {
    type: 'mc',
    q: '공업의 정의로 가장 올바른 것은?',
    choices: [
      '자연환경을 보호하며 생태계를 관리하는 산업활동',
      '자연의 생산물을 가공하여 중간재나 최종 생산물을 창출하고 부가가치를 높이는 산업활동',
      '1차 산업에서 생산된 농산물을 유통하는 활동',
      '지식과 정보를 기반으로 서비스를 제공하는 활동'
    ],
    answer: 1,
    exp: '공업은 자연의 생산물을 가공하는 제조 과정을 통해 중간재나 최종 생산물을 창출하여 부가가치를 높이는 산업활동입니다.'
  },
  {
    type: 'mc',
    q: '공업 발달을 위한 인적 자원에 해당하지 않는 것은?',
    choices: ['노동력', '기술 및 능력', '창의적 생각', '넓은 평야'],
    answer: 3,
    exp: '넓은 평야는 자연적 조건이지 인적자원이 아닙니다. 인적자원에는 노동력, 기술 및 능력, 창의적 생각, 협동심이 포함됩니다.'
  },
  {
    type: 'mc',
    q: '시장 지향형 공업의 대표적인 예로 가장 적절한 것은?',
    choices: ['철강 공업', '조선 공업', '얼음 제조 공업', '석유 화학 공업'],
    answer: 2,
    exp: '얼음 제조 공업은 제품이 무겁고 부피가 크며 변질되기 쉬워 소비자와 가까운 시장 주변에 입지하는 시장 지향형 공업의 대표 예입니다.'
  },
  {
    type: 'mc',
    q: '중세 길드(guild) 제도에 대한 설명으로 옳은 것은?',
    choices: [
      '대량 생산 체제를 갖춘 현대식 공장 제도이다',
      '국가가 자본을 출자하여 경영하는 공영 공업이다',
      '중세 상공업자들의 상호 부조적 동업 조합이다',
      '소비자 중심의 서비스 산업 조합이다'
    ],
    answer: 2,
    exp: '길드(guild)는 중세 상공업자들이 만든 상호 부조적 동업 조합으로, 장인(숙련된 기술자)들이 직인과 도제를 두고 생산 활동을 주도했습니다.'
  },
  {
    type: 'mc',
    q: '근대 산업 사회(산업혁명)의 특징으로 가장 거리가 먼 것은?',
    choices: ['공장 제도의 확립', '대량 생산 체제 구축', '지식 정보 중심 사회로 전환', '2차 산업의 비중 급격히 증가'],
    answer: 2,
    exp: '지식 정보 중심 사회는 현대 사회의 특징입니다. 근대 산업 사회(산업혁명)는 공장 제도 확립, 대량 생산 체제, 2차 산업(제조업) 비중 급증이 핵심 특징입니다.'
  },

// ─────────────────────────────────────────────
//  단답형 정답 판정 함수
//  - 공백 제거 후 허용 답안 목록과 대소문자 무시 비교
// ─────────────────────────────────────────────
function checkSAAnswer(input, answers) {
  const normalize = s => s.replace(/\s/g, '').toLowerCase();
  const normInput = normalize(input);
  return answers.some(a => normalize(a) === normInput);
}

// ─────────────────────────────────────────────
//  객관식 보기 셔플 유틸
//  choices 배열과 원래 정답 인덱스를 받아
//  { shuffledChoices, newAnswerIdx } 반환
// ─────────────────────────────────────────────
function shuffleChoices(choices, answerIdx) {
  // 각 보기에 원래 인덱스를 태그
  const tagged = choices.map((c, i) => ({ text: c, isAnswer: i === answerIdx }));
  // Fisher-Yates 셔플
  for (let i = tagged.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [tagged[i], tagged[j]] = [tagged[j], tagged[i]];
  }
  return {
    shuffledChoices: tagged.map(t => t.text),
    newAnswerIdx: tagged.findIndex(t => t.isAnswer)
  };
}

// ─────────────────────────────────────────────
//  전체 셔플
// ─────────────────────────────────────────────
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

let selectedQuestions = [];
let currentIdx = 0;
let score = 0;
let answered = false;

function startQuiz() {
  selectedQuestions = shuffle(ALL_QUESTIONS).slice(0, 20);
  currentIdx = 0;
  score = 0;
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  document.getElementById('live-score').textContent = 0;
  renderQuestion();
}

function renderQuestion() {
  answered = false;
  const q = selectedQuestions[currentIdx];
  const total = selectedQuestions.length;

  document.getElementById('cur-q').textContent = currentIdx + 1;
  document.getElementById('progress-fill').style.width = ((currentIdx + 1) / total * 100) + '%';
  document.getElementById('q-type').textContent = q.type === 'mc' ? '✏️ 객관식' : '📝 단답형';
  document.getElementById('q-text').textContent = q.q;
  document.getElementById('explanation').style.display = 'none';
  document.getElementById('btn-next').style.display = 'none';

  const area = document.getElementById('choices-area');
  area.innerHTML = '';

  if (q.type === 'mc') {
    // 보기를 렌더링마다 셔플
    const { shuffledChoices, newAnswerIdx } = shuffleChoices(q.choices, q.answer);

    const div = document.createElement('div');
    div.className = 'choices';
    const labels = ['①', '②', '③', '④'];
    shuffledChoices.forEach((c, i) => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.innerHTML = `<span class="choice-num">${labels[i]}</span><span>${c}</span>`;
      btn.onclick = () => handleMC(i, btn, div, newAnswerIdx);
      div.appendChild(btn);
    });
    area.appendChild(div);

  } else {
    // 단답형
    const wrap = document.createElement('div');
    wrap.className = 'short-answer-wrap';

    const row = document.createElement('div');
    row.className = 'short-input-row';

    const inp = document.createElement('input');
    inp.className = 'short-input';
    inp.type = 'text';
    inp.placeholder = '정답을 입력하세요';

    const submitBtn = document.createElement('button');
    submitBtn.className = 'btn-submit';
    submitBtn.textContent = '제출';

    const hint = document.createElement('div');
    hint.className = 'sa-hint';

    // 제출 로직 (클로저로 참조)
    const doSubmit = () => submitSA(inp, submitBtn, hint, q);
    inp.onkeydown = (e) => { if (e.key === 'Enter') doSubmit(); };
    submitBtn.onclick = doSubmit;

    row.appendChild(inp);
    row.appendChild(submitBtn);
    wrap.appendChild(row);
    wrap.appendChild(hint);
    area.appendChild(wrap);
    setTimeout(() => inp.focus(), 100);
  }
}

function handleMC(idx, btn, div, correctIdx) {
  if (answered) return;
  answered = true;
  const btns = div.querySelectorAll('.choice-btn');
  btns.forEach(b => b.disabled = true);
  const isCorrect = idx === correctIdx;
  btns[correctIdx].classList.add('correct');
  if (!isCorrect) btn.classList.add('wrong');
  if (isCorrect) score++;
  document.getElementById('live-score').textContent = score;
  showExp(selectedQuestions[currentIdx].exp);
}

function submitSA(inp, submitBtn, hint, q) {
  if (answered) return;
  const val = inp.value.trim();
  if (!val) return;
  answered = true;
  inp.disabled = true;
  submitBtn.disabled = true;

  const isCorrect = checkSAAnswer(val, q.answers);

  if (isCorrect) {
    inp.classList.add('correct');
    hint.className = 'sa-hint correct-hint';
    hint.textContent = '✅ 정답입니다!';
    score++;
  } else {
    inp.classList.add('wrong');
    hint.className = 'sa-hint wrong-hint';
    hint.textContent = `❌ 오답 — 정답: ${q.answers[0]}`;
  }
  document.getElementById('live-score').textContent = score;
  showExp(q.exp);
}

function showExp(text) {
  const el = document.getElementById('explanation');
  document.getElementById('exp-text').textContent = text;
  el.style.display = 'block';
  const nextBtn = document.getElementById('btn-next');
  nextBtn.style.display = 'block';
  nextBtn.textContent = currentIdx < selectedQuestions.length - 1 ? '다음 문제 →' : '결과 보기 🏁';
  nextBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function nextQuestion() {
  currentIdx++;
  if (currentIdx >= selectedQuestions.length) {
    showResult();
  } else {
    renderQuestion();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function showResult() {
  document.getElementById('quiz-screen').style.display = 'none';
  const rs = document.getElementById('result-screen');
  rs.style.display = 'flex';

  const total = selectedQuestions.length;
  const pct = Math.round(score / total * 100);

  document.getElementById('result-score-num').textContent = score;
  document.getElementById('cnt-correct').textContent = score;
  document.getElementById('cnt-wrong').textContent = total - score;

  setTimeout(() => {
    document.getElementById('bar-correct').style.width = (score / total * 100) + '%';
    document.getElementById('bar-wrong').style.width = ((total - score) / total * 100) + '%';
  }, 200);

  let emoji, title, detail;
  if (pct >= 90) {
    emoji = '🏆'; title = '완벽해요!';
    detail = `${total}문제 중 ${score}문제 정답 (${pct}%)\n공업 단원 완전 정복!`;
  } else if (pct >= 70) {
    emoji = '😊'; title = '잘했어요!';
    detail = `${total}문제 중 ${score}문제 정답 (${pct}%)\n조금만 더 보강하면 만점!`;
  } else if (pct >= 50) {
    emoji = '📖'; title = '더 공부해요!';
    detail = `${total}문제 중 ${score}문제 정답 (${pct}%)\n오답 노트를 꼭 만들어보세요.`;
  } else {
    emoji = '💪'; title = '다시 도전!';
    detail = `${total}문제 중 ${score}문제 정답 (${pct}%)\n핵심 개념을 다시 복습해요.`;
  }

  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('result-title').textContent = title;
  document.getElementById('result-detail').textContent = detail;
}

function goHome() {
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('start-screen').style.display = 'flex';
}
</script>
